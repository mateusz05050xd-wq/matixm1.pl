<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed;
  min-height: 100vh;
  transition: 0.5s ease;
}

/* MOTYWY */
.theme-blue { --main:#00c6ff; --second:#0072ff; }
.theme-green { --main:#00ff88; --second:#00c853; }
.theme-red { --main:#ff3b3b; --second:#ff0000; }
.theme-yellow { --main:#ffd700; --second:#ff8c00; }

/* TOPBAR */
.topbar {
  position: fixed; top: 0; width: 100%;
  display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000;
  background: rgba(15, 15, 26, 0.8);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}

.nav-group { display: flex; gap: 10px; z-index: 1001; }

/* DROPDOWN */
.dropdown { position: relative; }
.dropbtn {
  background: var(--glass); border: 1px solid var(--border);
  color: white; padding: 10px 18px; border-radius: 12px;
  cursor: pointer; font-weight: 500;
}

.dropdown-content {
  position: absolute; top: 50px; right: 0;
  background: #111; border: 1px solid var(--border);
  border-radius: 14px; min-width: 160px; display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.dropdown-content button {
  width: 100%; padding: 12px; background: none; border: none;
  color: white; text-align: left; cursor: pointer;
}
.dropdown-content button:hover { background: var(--main); }
.show { display: block; }

/* KONTENER I PRZYCISKI - NAPRAWA KLIKANIA */
.container { 
  max-width: 1000px; margin: auto; 
  padding: 120px 20px 60px; text-align: center;
}

.buttons { 
  display: flex; justify-content: center; 
  gap: 20px; flex-wrap: wrap; margin-bottom: 40px;
  position: relative; z-index: 10; /* Zapewnia klikalność */
}

.btn {
  padding: 16px 35px; border-radius: 50px; text-decoration: none;
  font-weight: 700; color: white;
  background: linear-gradient(45deg, var(--main), var(--second));
  transition: 0.3s ease;
  display: inline-block;
  cursor: pointer;
  border: none;
}
.btn:hover { transform: translateY(-5px); filter: brightness(1.2); }

.card {
  margin-top: 30px; padding: 30px; border-radius: 24px;
  background: var(--glass); border: 1px solid var(--border);
  backdrop-filter: blur(10px);
}

.coop-item { 
  display: block; margin: 10px 0; color: var(--main); 
  text-decoration: none; font-weight: bold; font-size: 1.2rem;
}

/* PANEL ADMINA */
#adminPanel {
  position: fixed; right: -350px; top: 0; width: 320px; height: 100%;
  background: #0a0a14; padding: 30px; z-index: 2000;
  border-left: 2px solid var(--main); transition: 0.4s;
  overflow-y: auto;
}
#adminPanel.active { right: 0; }

input, textarea {
  width: 100%; padding: 10px; margin: 10px 0;
  border-radius: 8px; border: 1px solid var(--border);
  background: rgba(255,255,255,0.05); color: white;
}
.save-btn {
  width: 100%; padding: 12px; background: var(--main);
  border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 10px;
}
</style>
</head>
<body>

<div class="topbar">
  <div style="font-weight: 700; font-size: 1.2rem;">MXM</div>
  <div class="nav-group">
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleMenu('langMenu')">🌐 <span id="langLabel">PL</span></button>
      <div class="dropdown-content" id="langMenu">
        <button onclick="setLang('pl')">🇵🇱 Polski</button>
        <button onclick="setLang('en')">🇬🇧 English</button>
        <button onclick="setLang('de')">🇩🇪 Deutsch</button>
      </div>
    </div>
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleMenu('themeMenu')">🎨 Styl</button>
      <div class="dropdown-content" id="themeMenu">
        <button onclick="setTheme('')">💜 Domyślny</button>
        <button onclick="setTheme('theme-yellow')">💛 Żółty</button>
        <button onclick="setTheme('theme-blue')">💙 Niebieski</button>
      </div>
    </div>
    <button class="dropbtn" onclick="openAdmin()">🔐</button>
  </div>
</div>

<div class="container">
  <h1 id="title">🔥 Społeczność MatiXM 🔥</h1>
  <p style="margin-bottom: 40px;">YouTube • Discord • Gaming</p>
  
  <div class="buttons">
    <a class="btn" id="discordLink" href="https://discord.gg" target="_blank">💬 Dołącz do Discorda</a>
    <a class="btn" id="ytLink" href="https://youtube.com" target="_blank">📺 Kanał YouTube</a>
  </div>

  <div class="card">
    <h2 id="coopTitle">Współprace 🤝</h2>
    <div id="coopList">
      <!-- Linki do współprac pojawią się tutaj -->
    </div>
  </div>
</div>

<!-- PANEL ADMINA -->
<div id="adminPanel">
  <h3>Ustawienia Admina</h3>
  <br>
  <label>Link Discord:</label>
  <input type="text" id="editDC" placeholder="https://discord.gg...">
  
  <label>Link YouTube:</label>
  <input type="text" id="editYT" placeholder="https://youtube.com...">
  
  <hr style="margin: 20px 0; opacity: 0.2;">
  
  <label>Współpraca (Nazwa):</label>
  <input type="text" id="coopName" placeholder="Np. Serwer MC">
  <label>Współpraca (Link):</label>
  <input type="text" id="coopUrl" placeholder="https://...">

  <button class="save-btn" onclick="saveAdmin()">💾 Zapisz wszystko</button>
  <button onclick="closeAdmin()" style="margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">Anuluj</button>
</div>

<script>
const PASS = "MatiXM05050";

function toggleMenu(id) {
  document.querySelectorAll('.dropdown-content').forEach(m => m.id !== id && m.classList.remove('show'));
  document.getElementById(id).classList.toggle('show');
}

function setTheme(t) { document.body.className = t; }

function setLang(lang) {
  const translations = {
    pl: { title: "🔥 Społeczność MatiXM 🔥", coop: "Współprace 🤝", dc: "💬 Dołącz do Discorda", yt: "📺 Kanał YouTube" },
    en: { title: "🔥 MatiXM Community 🔥", coop: "Partnerships 🤝", dc: "💬 Join Discord", yt: "📺 YouTube Channel" },
    de: { title: "🔥 MatiXM Gemeinschaft 🔥", coop: "Kooperationen 🤝", dc: "💬 Discord beitreten", yt: "📺 YouTube-Kanal" }
  };
  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("coopTitle").innerText = translations[lang].coop;
  document.getElementById("discordLink").innerText = translations[lang].dc;
  document.getElementById("ytLink").innerText = translations[lang].yt;
  document.getElementById("langLabel").innerText = lang.toUpperCase();
}

function openAdmin() {
  if(prompt("Hasło:") === PASS) document.getElementById("adminPanel").classList.add("active");
}

function closeAdmin() { document.getElementById("adminPanel").classList.remove("active"); }

function saveAdmin() {
  const data = {
    dc: document.getElementById("editDC").value,
    yt: document.getElementById("editYT").value,
    cName: document.getElementById("coopName").value,
    cUrl: document.getElementById("coopUrl").value
  };
  localStorage.setItem("matiConfig", JSON.stringify(data));
  applyData(data);
  closeAdmin();
}

function applyData(data) {
  if(data.dc) document.getElementById("discordLink").href = data.dc;
  if(data.yt) document.getElementById("ytLink").href = data.yt;
  if(data.cName && data.cUrl) {
    document.getElementById("coopList").innerHTML = `<a href="${data.cUrl}" class="coop-item" target="_blank">🔗 ${data.cName}</a>`;
  }
}

// Wczytywanie po starcie
window.onload = () => {
  const saved = JSON.parse(localStorage.getItem("matiConfig"));
  if(saved) applyData(saved);
};

// Zamykanie menu po kliknięciu obok
window.onclick = (e) => {
  if (!e.target.matches('.dropbtn')) {
    document.querySelectorAll('.dropdown-content').forEach(m => m.classList.remove('show'));
  }
};
</script>

</body>
</html>
