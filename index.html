<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>

<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
padding:50px;
}

button{
padding:15px 25px;
border:none;
border-radius:10px;
background:#ff00cc;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<h1>🔥 MatiXM 🔥</h1>

<!-- RECAPTCHA -->
<div class="g-recaptcha" data-sitekey="6LeJxI4sAAAAAKBpnEddzAMQsrr0ICAvi0PY1FHr"></div>

<br><br>

<button onclick="send()">Wyślij</button>

<p id="status"></p>

<script>
async function send(){
const token = grecaptcha.getResponse();

if(!token){
document.getElementById("status").innerText="❌ Zrób weryfikację!";
return;
}

const res = await fetch("http://localhost:3000/verify",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({token})
});

const data = await res.json();

if(data.success){
document.getElementById("status").innerText="✅ Zweryfikowano!";
}else{
document.getElementById("status").innerText="❌ Bot wykryty!";
}
}
</script>

</body>
</html>
