<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

.theme-green { --main: #00ff00; --second: #008000; }
.theme-yellow { --main: #ffff00; --second: #ffaa00; }
.theme-blue { --main: #0000ff; --second: #00ccff; }
.theme-red { --main: #ff0000; --second: #8b0000; }

/* TOPBAR */
.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(15, 15, 26, 0.95);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }

/* CONTAINER */
.container { max-width: 1100px; margin: auto; padding: 120px 20px 60px; text-align: center; }
h1 { font-size: clamp(35px, 8vw, 75px); font-weight: 900; margin-bottom: 10px; background: linear-gradient(90deg, var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.hero-btns { display: flex; justify-content: center; gap: 20px; margin: 40px 0; z-index: 100; position: relative; }
.btn { padding: 20px 50px; border-radius: 50px; text-decoration: none; font-weight: 900; color: white; background: linear-gradient(45deg, var(--main), var(--second)); box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; }
.btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 0 30px var(--main); }

/* STATS SECTION (ZAMIAST FILMU) */
.stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
.stat-box { background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
.stat-box h3 { font-size: 2.5rem; font-weight: 900; color: var(--main); margin-bottom: 5px; }
.stat-box p { font-size: 0.9rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

.card { margin-top: 30px; padding: 40px; border-radius: 30px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(15px); }
.coop-list { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
.coop-box { padding: 15px 25px; border-radius: 15px; border: 2px solid var(--main); color: var(--main); text-decoration: none; font-weight: 900; }

/* 🔐 MEGA PANEL ADMINA V5 */
#adminPanel {
  position: fixed; right: -450px; top: 0; width: 420px; height: 100vh;
  background: #050508; z-index: 9999; border-left: 5px solid var(--main);
  box-shadow: -20px 0 80px rgba(0,0,0,1); display: flex; flex-direction: column;
}
#adminPanel.active { right: 0; }

.admin-header { padding: 25px; background: var(--main); color: #000; font-weight: 900; display: flex; justify-content: space-between; align-items: center; }
.admin-tabs { display: flex; background: #111; }
.tab-btn { flex: 1; padding: 15px; border: none; background: #1a1a1a; color: #666; cursor: pointer; font-weight: 900; font-size: 10px; border-bottom: 2px solid transparent; }
.tab-btn.active { background: #050508; color: var(--main); border-bottom: 2px solid var(--main); }

.admin-scroll { padding: 25px; overflow-y: auto; flex-grow: 1; }
.admin-body { display: none; }
.admin-body.active { display: block; }

.group { margin-bottom: 25px; border: 1px solid var(--border); padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.01); }
.group label { display: block; font-size: 10px; color: var(--main); font-weight: 900; margin-bottom: 10px; text-transform: uppercase; }

.admin-input { width: 100%; padding: 14px; background: #111; border: 1px solid #333; border-radius: 12px; color: #fff; margin-bottom: 10px; font-family: inherit; }
.btn-mega { width: 100%; padding: 18px; background: var(--main); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; }
.dropbtn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <button class="dropbtn" onclick="openA()">🔐 PANEL STEROWANIA</button>
</div>

<div class="container">
  <h1 id="txtTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  <p id="txtTag" style="opacity:0.8; font-size: 1.2rem;">Najlepsza ekipa w sieci</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="linkDC" target="_blank">💬 DISCORD</a>
    <a href="#" class="btn" id="linkYT" target="_blank">📺 YOUTUBE</a>
  </div>

  <!-- STATYSTYKI ZAMIAST FILMU -->
  <div class="stats-container">
    <div class="stat-box">
      <h3 id="stat1Val">1.2k</h3>
      <p id="stat1Lab">Subskrypcji</p>
    </div>
    <div class="stat-box">
      <h3 id="stat2Val">500+</h3>
      <p id="stat2Lab">Ludzi na DC</p>
    </div>
    <div class="stat-box">
      <h3 id="stat3Val">24/7</h3>
      <p id="stat3Lab">Aktywności</p>
    </div>
  </div>

  <div class="card" id="newsBox" style="display:none;">
    <h2 id="newsHeader">OGŁOSZENIE</h2>
    <p id="newsContent" style="margin-top:20px; font-size: 1.4rem;"></p>
  </div>

  <div class="card">
    <h2 id="coopHeader">WSPÓŁPRACE 🤝</h2>
    <div id="coopList" class="coop-list">
      <p style="opacity:0.3">Brak aktywnych współprac.</p>
    </div>
  </div>
</div>

<!-- 🔐 MEGA PANEL ADMINA -->
<div id="adminPanel">
  <div class="admin-header">
    <span>X_MATIXM CONTROL V5</span>
    <span onclick="closeA()" style="cursor:pointer">×</span>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" onclick="tab(0)">GŁÓWNE</button>
    <button class="tab-btn" onclick="tab(1)">LICZNIKI</button>
    <button class="tab-btn" onclick="tab(2)">KOLORY</button>
  </div>

  <div class="admin-scroll">
    <!-- TAB 0: GŁÓWNE -->
    <div class="admin-body active">
      <div class="group">
        <label>Treści Nagłówka</label>
        <input type="text" id="inTitle" class="admin-input" placeholder="Tytuł strony">
        <input type="text" id="inTag" class="admin-input" placeholder="Podtytuł">
      </div>
      <div class="group">
        <label>Ogłoszenie (Puste = Ukryj)</label>
        <textarea id="inNews" class="admin-input" rows="4"></textarea>
      </div>
      <div class="group">
        <label>Partnerzy</label>
        <input type="text" id="inCName" class="admin-input" placeholder="Nazwa">
        <input type="text" id="inCLink" class="admin-input" placeholder="Link">
      </div>
      <button class="btn-mega" onclick="save()">ZAPISZ ZMIANY</button>
    </div>

    <!-- TAB 1: LICZNIKI -->
    <div class="admin-body">
      <div class="group">
        <label>Licznik 1 (np. YouTube)</label>
        <input type="text" id="inS1V" class="admin-input" placeholder="Wartość (np. 1.2k)">
        <input type="text" id="inS1L" class="admin-input" placeholder="Etykieta (np. Subskrypcji)">
      </div>
      <div class="group">
        <label>Licznik 2 (np. Discord)</label>
        <input type="text" id="inS2V" class="admin-input" placeholder="Wartość (np. 500+)">
        <input type="text" id="inS2L" class="admin-input" placeholder="Etykieta (np. Ludzi na DC)">
      </div>
      <div class="group">
        <label>Licznik 3 (np. Projekty)</label>
        <input type="text" id="inS3V" class="admin-input" placeholder="Wartość">
        <input type="text" id="inS3L" class="admin-input" placeholder="Etykieta">
      </div>
      <button class="btn-mega" onclick="save()">AKTUALIZUJ LICZNIKI</button>
    </div>

    <!-- TAB 2: KOLORY I SYSTEM -->
    <div class="admin-body">
      <div class="group">
        <label>Wybierz kolor motywu</label>
        <button class="btn-mega" style="background:#00ff00; margin-bottom:5px" onclick="setT('theme-green')">ZIELONY</button>
        <button class="btn-mega" style="background:#ffff00; margin-bottom:5px" onclick="setT('theme-yellow')">ŻÓŁTY</button>
        <button class="btn-mega" style="background:#0000ff; color:white; margin-bottom:5px" onclick="setT('theme-blue')">NIEBIESKI</button>
        <button class="btn-mega" style="background:#ff0000; color:white; margin-bottom:5px" onclick="setT('theme-red')">CZERWONY</button>
        <button class="btn-mega" style="background:#ff00cc; color:white;" onclick="setT('')">FIOLETOWY</button>
      </div>
      <div class="group">
        <label>Linki Social Media</label>
        <input type="text" id="inDC" class="admin-input" placeholder="Discord URL">
        <input type="text" id="inYT" class="admin-input" placeholder="YouTube URL">
      </div>
      <button class="btn-mega" onclick="save()">ZAPISZ SOCIALE</button>
    </div>
  </div>
</div>

<script>
const KEY = "xm_mati_db_v5";
const PASS = "FrakoMat051205";

function tab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.querySelectorAll('.admin-body').forEach((b, i) => b.classList.toggle('active', i === idx));
}

function openA() {
    if(prompt("FrakoMat System Security\nPodaj hasło:") === PASS) {
        document.getElementById("adminPanel").classList.add("active");
    } else { alert("ACCESS DENIED"); }
}
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

function save() {
    const data = {
        t: document.getElementById("inTitle").value,
        g: document.getElementById("inTag").value,
        n: document.getElementById("inNews").value,
        dc: document.getElementById("inDC").value,
        yt: document.getElementById("inYT").value,
        cn: document.getElementById("inCName").value,
        cl: document.getElementById("inCLink").value,
        th: document.getElementById("body").className,
        s1v: document.getElementById("inS1V").value,
        s1l: document.getElementById("inS1L").value,
        s2v: document.getElementById("inS2V").value,
        s2l: document.getElementById("inS2L").value,
        s3v: document.getElementById("inS3V").value,
        s3l: document.getElementById("inS3L").value
    };
    localStorage.setItem(KEY, JSON.stringify(data));
    apply(data);
    alert("SYSTEM ZAKTUALIZOWANY");
}

function apply(data) {
    if(data.t) document.getElementById("txtTitle").innerText = data.t;
    if(data.g) document.getElementById("txtTag").innerText = data.g;
    if(data.dc) document.getElementById("linkDC").href = data.dc;
    if(data.yt) document.getElementById("linkYT").href = data.yt;
    if(data.th) document.getElementById("body").className = data.th;
    
    // Ogłoszenie
    const nBox = document.getElementById("newsBox");
    if(data.n && data.n.trim() !== "") {
        document.getElementById("newsContent").innerText = data.n;
        nBox.style.display = "block";
    } else { nBox.style.display = "none"; }

    // Statystyki
    if(data.s1v) document.getElementById("stat1Val").innerText = data.s1v;
    if(data.s1l) document.getElementById("stat1Lab").innerText = data.s1l;
    if(data.s2v) document.getElementById("stat2Val").innerText = data.s2v;
    if(data.s2l) document.getElementById("stat2Lab").innerText = data.s2l;
    if(data.s3v) document.getElementById("stat3Val").innerText = data.s3v;
    if(data.s3l) document.getElementById("stat3Lab").innerText = data.s3l;

    // Współpraca
    if(data.cn && data.cl) {
        document.getElementById("coopList").innerHTML = `<a href="${data.cl}" class="coop-box" target="_blank">🔗 ${data.cn}</a>`;
    }
}

function setT(t) { document.getElementById("body").className = t; }

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved) {
        apply(saved);
        document.getElementById("inTitle").value = saved.t || "";
        document.getElementById("inTag").value = saved.g || "";
        document.getElementById("inNews").value = saved.n || "";
        document.getElementById("inDC").value = saved.dc || "";
        document.getElementById("inYT").value = saved.yt || "";
        document.getElementById("inCName").value = saved.cn || "";
        document.getElementById("inCLink").value = saved.cl || "";
        document.getElementById("inS1V").value = saved.s1v || "";
        document.getElementById("inS1L").value = saved.s1l || "";
        document.getElementById("inS2V").value = saved.s2v || "";
        document.getElementById("inS2L").value = saved.s2l || "";
        document.getElementById("inS3V").value = saved.s3v || "";
        document.getElementById("inS3L").value = saved.s3l || "";
    }
};
</script>
</body>
</html>
