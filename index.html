<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
.theme-green { --main: #00ff00; --second: #008000; }
.theme-yellow { --main: #ffff00; --second: #ffaa00; }
.theme-blue { --main: #0000ff; --second: #00ccff; }
.theme-red { --main: #ff0000; --second: #8b0000; }

.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(15, 15, 26, 0.95);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }

.container { max-width: 1100px; margin: auto; padding: 120px 20px 60px; text-align: center; }
h1 { font-size: clamp(35px, 8vw, 75px); font-weight: 900; margin-bottom: 10px; background: linear-gradient(90deg, var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.hero-btns { display: flex; justify-content: center; gap: 20px; margin: 40px 0; z-index: 100; position: relative; }
.btn { padding: 20px 50px; border-radius: 50px; text-decoration: none; font-weight: 900; color: white; background: linear-gradient(45deg, var(--main), var(--second)); cursor: pointer; border: none; }

.stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
.stat-box { background: var(--glass); padding: 30px; border-radius: 25px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
.stat-box h3 { font-size: 2.5rem; font-weight: 900; color: var(--main); margin-bottom: 5px; }

.card { margin-top: 30px; padding: 40px; border-radius: 30px; background: var(--glass); border: 1px solid var(--border); }
.coop-box { display: inline-block; padding: 15px 25px; border-radius: 15px; border: 2px solid var(--main); color: var(--main); text-decoration: none; font-weight: 900; margin-top: 20px; }

/* 🔐 ULTIMATE ADMIN PANEL V6 */
#adminPanel {
  position: fixed; right: -460px; top: 0; width: 440px; height: 100vh;
  background: #050508; z-index: 9999; border-left: 5px solid var(--main);
  box-shadow: -20px 0 80px rgba(0,0,0,1); display: flex; flex-direction: column;
}
#adminPanel.active { right: 0; }

.admin-header { padding: 20px; background: var(--main); color: #000; font-weight: 900; display: flex; justify-content: space-between; }
.admin-tabs { display: flex; background: #111; overflow-x: auto; }
.tab-btn { flex: 1; padding: 15px; border: none; background: #1a1a1a; color: #666; cursor: pointer; font-weight: 900; font-size: 10px; min-width: 100px; }
.tab-btn.active { background: #050508; color: var(--main); }

.admin-scroll { padding: 20px; overflow-y: auto; flex-grow: 1; }
.admin-body { display: none; }
.admin-body.active { display: block; }

.field { margin-bottom: 15px; }
.field label { display: block; font-size: 10px; color: var(--main); font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
.admin-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; font-family: inherit; }

.btn-save { width: 100%; padding: 15px; background: var(--main); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; }
.sync-box { margin-top: 20px; padding: 15px; background: rgba(0,255,204,0.05); border-radius: 10px; border: 1px dashed var(--main); text-align: center; }

.dropbtn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <button class="dropbtn" onclick="openA()">🔐 PANEL STEROWANIA</button>
</div>

<div class="container">
  <h1 id="txtTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  <p id="txtTag" style="opacity:0.8">Witaj w centrum naszej ekipy!</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="linkDC" target="_blank">💬 DISCORD</a>
    <a href="#" class="btn" id="linkYT" target="_blank">📺 YOUTUBE</a>
  </div>

  <div class="stats-container">
    <div class="stat-box"><h3 id="s1v">0</h3><p id="s1l">Licznik 1</p></div>
    <div class="stat-box"><h3 id="s2v">0</h3><p id="s2l">Licznik 2</p></div>
    <div class="stat-box"><h3 id="s3v">0</h3><p id="s3l">Licznik 3</p></div>
  </div>

  <div class="card" id="newsBox" style="display:none;">
    <h2 id="newsHeader">OGŁOSZENIE</h2>
    <p id="newsContent" style="margin-top:20px; font-size: 1.4rem;"></p>
  </div>

  <div class="card">
    <h2 id="coopHeader">WSPÓŁPRACE 🤝</h2>
    <div id="coopList"></div>
  </div>
</div>

<div id="adminPanel">
  <div class="admin-header"><span>ADMIN V6 | x_MatiXM</span><span onclick="closeA()" style="cursor:pointer">×</span></div>
  <div class="admin-tabs">
    <button class="tab-btn active" onclick="tab(0)">DANE</button>
    <button class="tab-btn" onclick="tab(1)">LICZNIKI</button>
    <button class="tab-btn" onclick="tab(2)">KOLORY</button>
    <button class="tab-btn" onclick="tab(3)">SYNCHRO</button>
  </div>

  <div class="admin-scroll">
    <!-- TAB 0 -->
    <div class="admin-body active">
      <div class="field"><label>Nagłówek</label><input type="text" id="inT" class="admin-input"></div>
      <div class="field"><label>Podtytuł</label><input type="text" id="inTag" class="admin-input"></div>
      <div class="field"><label>Ogłoszenie</label><textarea id="inN" class="admin-input" rows="3"></textarea></div>
      <div class="field"><label>Partner</label><input type="text" id="inCN" class="admin-input" placeholder="Nazwa"><input type="text" id="inCL" class="admin-input" placeholder="Link"></div>
      <button class="btn-save" onclick="save()">ZAPISZ DANE</button>
    </div>
    <!-- TAB 1 -->
    <div class="admin-body">
      <div class="field"><label>Licznik 1</label><input type="text" id="inS1V" class="admin-input"><input type="text" id="inS1L" class="admin-input"></div>
      <div class="field"><label>Licznik 2</label><input type="text" id="inS2V" class="admin-input"><input type="text" id="inS2L" class="admin-input"></div>
      <div class="field"><label>Licznik 3</label><input type="text" id="inS3V" class="admin-input"><input type="text" id="inS3L" class="admin-input"></div>
      <button class="btn-save" onclick="save()">ZAKTUALIZUJ LICZNIKI</button>
    </div>
    <!-- TAB 2 -->
    <div class="admin-body">
      <button class="btn-save" style="background:#00ff00" onclick="setT('theme-green')">ZIELONY</button>
      <button class="btn-save" style="background:#ffff00" onclick="setT('theme-yellow')">ŻÓŁTY</button>
      <button class="btn-save" style="background:#0000ff; color:#fff" onclick="setT('theme-blue')">NIEBIESKI</button>
      <button class="btn-save" style="background:#ff00cc; color:#fff" onclick="setT('')">FIOLETOWY</button>
      <div class="field" style="margin-top:20px"><label>Social Media</label><input type="text" id="inDC" class="admin-input" placeholder="Discord"><input type="text" id="inYT" class="admin-input" placeholder="YouTube"></div>
      <button class="btn-save" onclick="save()">ZAPISZ STYLE</button>
    </div>
    <!-- TAB 3 -->
    <div class="admin-body">
      <p style="font-size: 11px; opacity:0.6">Aby Twoje liczniki i kolory były takie same na telefonie i PC, skopiuj ten kod i wklej go na drugim urządzeniu:</p>
      <textarea id="syncCode" class="admin-input" style="font-size:10px" rows="5" readonly></textarea>
      <button class="btn-save" onclick="copySync()">KOPIUJ KOD SYNCHRO</button>
      <div class="sync-box">
        <label>Importuj z innego urządzenia:</label>
        <input type="text" id="importCode" class="admin-input" placeholder="Wklej kod tutaj">
        <button class="btn-save" style="background: #fff" onclick="importData()">IMPORTUJ DANE</button>
      </div>
    </div>
  </div>
</div>

<script>
const PASS = "FrakoMat051205";
const KEY = "xm_mati_final_v6";

function tab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.querySelectorAll('.admin-body').forEach((b, i) => b.classList.toggle('active', i === idx));
}

function openA() { if(prompt("Podaj hasło admina:") === PASS) document.getElementById("adminPanel").classList.add("active"); }
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

function save() {
    const data = {
        t: document.getElementById("inT").value,
        tag: document.getElementById("inTag").value,
        n: document.getElementById("inN").value,
        cn: document.getElementById("inCN").value,
        cl: document.getElementById("inCL").value,
        s1v: document.getElementById("inS1V").value, s1l: document.getElementById("inS1L").value,
        s2v: document.getElementById("inS2V").value, s2l: document.getElementById("inS2L").value,
        s3v: document.getElementById("inS3V").value, s3l: document.getElementById("inS3L").value,
        dc: document.getElementById("inDC").value, yt: document.getElementById("inYT").value,
        theme: document.getElementById("body").className
    };
    localStorage.setItem(KEY, JSON.stringify(data));
    apply(data);
    updateSyncField();
    alert("Zapisano! Pamiętaj, aby użyć kodu SYNCHRO na innych urządzeniach.");
}

function apply(d) {
    if(d.t) document.getElementById("txtTitle").innerText = d.t;
    if(d.tag) document.getElementById("txtTag").innerText = d.tag;
    if(d.dc) document.getElementById("linkDC").href = d.dc;
    if(d.yt) document.getElementById("linkYT").href = d.yt;
    if(d.theme) document.getElementById("body").className = d.theme;
    
    const nBox = document.getElementById("newsBox");
    if(d.n && d.n.trim() !== "") {
        document.getElementById("newsContent").innerText = d.n;
        nBox.style.display = "block";
    } else { nBox.style.display = "none"; }

    document.getElementById("s1v").innerText = d.s1v || "0"; document.getElementById("s1l").innerText = d.s1l || "Licznik 1";
    document.getElementById("s2v").innerText = d.s2v || "0"; document.getElementById("s2l").innerText = d.s2l || "Licznik 2";
    document.getElementById("s3v").innerText = d.s3v || "0"; document.getElementById("s3l").innerText = d.s3l || "Licznik 3";

    if(d.cn && d.cl) document.getElementById("coopList").innerHTML = `<a href="${d.cl}" class="coop-box" target="_blank">🔗 ${d.cn}</a>`;
}

function updateSyncField() {
    const data = localStorage.getItem(KEY);
    document.getElementById("syncCode").value = btoa(data); // kodowanie base64
}

function copySync() {
    const copyText = document.getElementById("syncCode");
    copyText.select();
    document.execCommand("copy");
    alert("Skopiowano kod! Wklej go w zakładce SYNCHRO na innym urządzeniu.");
}

function importData() {
    try {
        const code = document.getElementById("importCode").value;
        const decoded = atob(code);
        localStorage.setItem(KEY, decoded);
        location.reload();
    } catch(e) { alert("Błędny kod importu!"); }
}

function setT(t) { document.getElementById("body").className = t; }

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved) {
        apply(saved);
        document.getElementById("inT").value = saved.t || "";
        document.getElementById("inTag").value = saved.tag || "";
        document.getElementById("inN").value = saved.n || "";
        document.getElementById("inCN").value = saved.cn || "";
        document.getElementById("inCL").value = saved.cl || "";
        document.getElementById("inS1V").value = saved.s1v || ""; document.getElementById("inS1L").value = saved.s1l || "";
        document.getElementById("inS2V").value = saved.s2v || ""; document.getElementById("inS2L").value = saved.s2l || "";
        document.getElementById("inS3V").value = saved.s3v || ""; document.getElementById("inS3L").value = saved.s3l || "";
        document.getElementById("inDC").value = saved.dc || ""; document.getElementById("inYT").value = saved.yt || "";
        updateSyncField();
    }
};
</script>
</body>
</html>
