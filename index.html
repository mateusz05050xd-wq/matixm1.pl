<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
/* KOLORY I RESET */
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
.theme-green { --main: #00ff00; --second: #008000; }
.theme-yellow { --main: #ffff00; --second: #ffaa00; }
.theme-blue { --main: #0000ff; --second: #00ccff; }
.theme-red { --main: #ff0000; --second: #8b0000; }

/* TOPBAR */
.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(15, 15, 26, 0.9);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }

/* CONTENT */
.container { max-width: 1000px; margin: auto; padding: 120px 20px 60px; text-align: center; }
h1 { 
  font-size: clamp(30px, 8vw, 65px); font-weight: 900; margin-bottom: 20px;
  background: linear-gradient(90deg, var(--main), var(--second));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.hero-btns { display: flex; justify-content: center; gap: 20px; margin: 40px 0; position: relative; z-index: 100; }
.btn {
  padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 700; color: white;
  background: linear-gradient(45deg, var(--main), var(--second)); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
.btn:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 10px 25px var(--main); }

.video-wrapper {
  max-width: 850px; margin: 30px auto; aspect-ratio: 16/9; border-radius: 25px; 
  overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.video-wrapper iframe { width: 100%; height: 100%; border: none; }

.card { margin-top: 30px; padding: 40px; border-radius: 24px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(12px); }
.coop-list { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
.coop-box { padding: 10px 20px; border-radius: 12px; border: 2px solid var(--main); color: var(--main); text-decoration: none; font-weight: bold; }

/* 🔐 ULEPSZONY PANEL ADMINA */
#adminPanel {
  position: fixed; right: -400px; top: 0; width: 380px; height: 100%;
  background: #0d0d16; padding: 0; z-index: 2000;
  border-left: 4px solid var(--main); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: -20px 0 50px rgba(0,0,0,0.9); display: flex; flex-direction: column;
}
#adminPanel.active { right: 0; }

.admin-nav { padding: 25px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.admin-content { padding: 25px; overflow-y: auto; flex-grow: 1; }

.admin-section { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
.admin-label { display: block; font-size: 10px; text-transform: uppercase; color: var(--main); font-weight: 800; margin-bottom: 8px; letter-spacing: 1px; }

.admin-input {
  width: 100%; padding: 12px; background: #161625; border: 1px solid var(--border);
  border-radius: 10px; color: white; font-family: inherit; margin-bottom: 10px;
}
.admin-input:focus { border-color: var(--main); outline: none; background: #1c1c2e; }

.admin-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.stat-item { background: #161625; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
.stat-item span { display: block; font-size: 18px; font-weight: 900; color: var(--main); }
.stat-item label { font-size: 9px; opacity: 0.6; }

.admin-btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-save { background: var(--main); color: #000; margin-top: 10px; }
.btn-save:hover { filter: brightness(1.2); transform: scale(1.02); }
.btn-action { background: rgba(255,255,255,0.05); color: white; font-size: 12px; margin-top: 5px; }
.btn-action:hover { background: rgba(255,255,255,0.1); }

.dropbtn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 15px; border-radius: 12px; cursor: pointer; }
.dropdown { position: relative; display: inline-block; }
.dropdown-content { position: absolute; top: 50px; right: 0; background: #111; border-radius: 12px; min-width: 150px; display: none; z-index: 1000; border: 1px solid var(--border); }
.dropdown-content button { width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; cursor: pointer; }
.dropdown-content button:hover { background: var(--main); color: #000; }
.show { display: block; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <div style="display:flex; gap:10px;">
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleM('themeM')">🎨 Styl</button>
      <div class="dropdown-content" id="themeM">
        <button onclick="setT('theme-green')">Zielony</button>
        <button onclick="setT('theme-yellow')">Żółty</button>
        <button onclick="setT('theme-blue')">Niebieski</button>
        <button onclick="setT('theme-red')">Czerwony</button>
        <button onclick="setT('')">Fioletowy</button>
      </div>
    </div>
    <button class="dropbtn" onclick="openA()">🔐 Admin</button>
  </div>
</div>

<div class="container">
  <h1 id="txtTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  <p id="txtTag" style="opacity:0.7">YouTube • Discord • Społeczność</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="linkDC" target="_blank">💬 DISCORD</a>
    <a href="#" class="btn" id="linkYT" target="_blank">📺 YOUTUBE</a>
  </div>

  <div class="card" id="newsBox" style="display:none;">
    <h2 id="newsHeader">Ogłoszenie</h2>
    <p id="newsContent" style="margin-top:15px; font-size: 1.2rem;"></p>
  </div>

  <div class="video-wrapper">
    <iframe id="videoPlayer" src="https://youtube.com" allowfullscreen></iframe>
  </div>

  <div class="card">
    <h2>Współprace 🤝</h2>
    <div id="coopList" class="coop-list">
      <p style="opacity:0.3">Brak współprac.</p>
    </div>
  </div>
</div>

<!-- 🔐 ULEPSZONY PANEL ADMINA -->
<div id="adminPanel">
  <div class="admin-nav">
    <h2 style="font-size:18px;">Dashboard</h2>
    <span onclick="closeA()" style="cursor:pointer; font-size:24px;">&times;</span>
  </div>

  <div class="admin-content">
    <div class="admin-stats">
      <div class="stat-item"><span id="statTime">0</span><label>Minut sesji</label></div>
      <div class="stat-item"><span id="statEdits">0</span><label>Zmian</label></div>
    </div>

    <div class="admin-section">
      <label class="admin-label">Wygląd Strony</label>
      <input type="text" id="inTitle" class="admin-input" placeholder="Tytuł główny" oninput="livePreview()">
      <input type="text" id="inTag" class="admin-input" placeholder="Podtytuł (Tagline)">
    </div>

    <div class="admin-section">
      <label class="admin-label">Centrum Ogłoszeń</label>
      <textarea id="inNews" class="admin-input" rows="3" placeholder="Treść ważnej wiadomości..."></textarea>
      <button class="admin-btn btn-action" onclick="document.getElementById('inNews').value='';">❌ Wyczyść tekst</button>
    </div>

    <div class="admin-section">
      <label class="admin-label">Multimedia (YouTube Link)</label>
      <input type="text" id="inYT" class="admin-input" placeholder="Link do najnowszego filmu">
      <label class="admin-label">Social Media</label>
      <input type="text" id="inDC" class="admin-input" placeholder="Link Discord">
      <input type="text" id="inYTLink" class="admin-input" placeholder="Link do kanału YT">
    </div>

    <div class="admin-section">
      <label class="admin-label">Zarządzanie Partnerami</label>
      <input type="text" id="inCName" class="admin-input" placeholder="Nazwa partnera">
      <input type="text" id="inCLink" class="admin-input" placeholder="Link (http...)">
    </div>

    <button class="admin-btn btn-save" onclick="saveData()">💾 ZAPISZ WSZYSTKO</button>
    <p style="text-align:center; font-size:10px; margin-top:15px; opacity:0.5;">Panel v2.5 | Zalogowany jako Admin</p>
  </div>
</div>

<script>
const PASS = "FrakoMat051205";
const DATA_KEY = "xm_mati_pro_db";

let editCount = 0;
let startTime = Date.now();

/* STATYSTYKI */
setInterval(() => {
    document.getElementById("statTime").innerText = Math.floor((Date.now() - startTime) / 60000);
}, 1000);

function livePreview() {
    document.getElementById("txtTitle").innerText = document.getElementById("inTitle").value || "🔥 Społeczność x_MatiXM 🔥";
}

/* UI FUNCTIONS */
function toggleM(id) {
    document.querySelectorAll('.dropdown-content').forEach(d => d.id !== id && d.classList.remove('show'));
    document.getElementById(id).classList.toggle('show');
}
function setT(t) { document.getElementById("body").className = t; }
function openA() { 
    if(prompt("Podaj tajne hasło:") === PASS) {
        document.getElementById("adminPanel").classList.add("active");
    } else {
        alert("Błędne hasło!");
    }
}
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

/* YOUTUBE PARSER */
function getYTId(url) {
    const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(reg);
    return (match && match.length == 11) ? match : url;
}

/* DATA LOGIC */
function saveData() {
    const data = {
        title: document.getElementById("inTitle").value,
        tag: document.getElementById("inTag").value,
        news: document.getElementById("inNews").value,
        ytVid: getYTId(document.getElementById("inYT").value),
        linkDC: document.getElementById("inDC").value,
        linkYT: document.getElementById("inYTLink").value,
        cName: document.getElementById("inCName").value,
        cLink: document.getElementById("inCLink").value
      };
    localStorage.setItem(DATA_KEY, JSON.stringify(data));
    apply(data);
    editCount++;
    document.getElementById("statEdits").innerText = editCount;
    alert("🚀 Dane zostały zaktualizowane!");
    closeA();
}

function apply(data) {
    if(data.title) document.getElementById("txtTitle").innerText = data.title;
    if(data.tag) document.getElementById("txtTag").innerText = data.tag;
    
    // Socials
    if(data.linkDC) document.getElementById("linkDC").href = data.linkDC;
    if(data.linkYT) document.getElementById("linkYT").href = data.linkYT;

    // News
    const nBox = document.getElementById("newsBox");
    if(data.news && data.news.trim() !== "") {
        document.getElementById("newsContent").innerText = data.news;
        nBox.style.display = "block";
    } else {
        nBox.style.display = "none";
    }

    // Video
    if(data.ytVid) {
        document.getElementById("videoPlayer").src = `https://youtube.com{data.ytVid}`;
    }

    // Coop
    if(data.cName && data.cLink) {
        document.getElementById("coopList").innerHTML = `<a href="${data.cLink}" class="coop-box" target="_blank">🔗 ${data.cName}</a>`;
    }
}

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem(DATA_KEY));
    if(saved) {
        apply(saved);
        // Fill inputs
        document.getElementById("inTitle").value = saved.title || "";
        document.getElementById("inTag").value = saved.tag || "";
        document.getElementById("inNews").value = saved.news || "";
        document.getElementById("inYT").value = saved.ytVid || "";
        document.getElementById("inDC").value = saved.linkDC || "";
        document.getElementById("inYTLink").value = saved.linkYT || "";
        document.getElementById("inCName").value = saved.cName || "";
        document.getElementById("inCLink").value = saved.cLink || "";
    }
};

window.onclick = (e) => { if(!e.target.matches('.dropbtn')) document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); };
</script>
</body>
</html>
