<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community | Live Sync</title>
<link href="https://googleapis.com" rel="stylesheet">
<!-- Biblioteka do zrzutów ekranu -->
<script src="https://hertzen.com"></script>

<style>
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
.theme-green { --main: #00ff00; --second: #008000; }
.theme-yellow { --main: #ffff00; --second: #ffaa00; }
.theme-blue { --main: #0000ff; --second: #00ccff; }
.theme-red { --main: #ff0000; --second: #8b0000; }

/* TOPBAR */
.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(15, 15, 26, 0.95);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }

/* CONTENT */
.container { max-width: 1100px; margin: auto; padding: 120px 20px 60px; text-align: center; }
h1 { font-size: clamp(35px, 8vw, 75px); font-weight: 900; background: linear-gradient(90deg, var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px;}

/* ULEPSZONE OGŁOSZENIE */
#newsBox {
  margin: 40px auto; padding: 40px; border-radius: 30px;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
  border: 2px solid var(--main); box-shadow: 0 0 30px rgba(var(--main), 0.2);
  position: relative; overflow: hidden; display: none;
  animation: pulse border 2s infinite;
}
#newsBox::before {
    content: "LIVE UPDATE"; position: absolute; top: 10px; right: 20px; 
    font-size: 10px; font-weight: 900; color: var(--main); opacity: 0.5;
}

/* ULEPSZONE WSPÓŁPRACE */
.coop-section { margin-top: 50px; }
#coopList { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
.coop-card {
  padding: 20px 40px; border-radius: 20px; background: var(--glass);
  border: 1px solid var(--border); color: #fff; text-decoration: none;
  font-weight: 700; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
.coop-card:hover { 
    border-color: var(--main); transform: translateY(-10px) scale(1.05);
    background: rgba(255,255,255,0.08); box-shadow: 0 0 20px var(--main);
}

/* PANEL ADMINA */
#adminPanel {
  position: fixed; right: -450px; top: 0; width: 400px; height: 100vh;
  background: #080810; z-index: 9999; border-left: 5px solid var(--main);
  box-shadow: -20px 0 80px #000; display: flex; flex-direction: column;
}
#adminPanel.active { right: 0; }
.admin-content { padding: 25px; overflow-y: auto; flex-grow: 1; }
.admin-input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; border-radius: 10px; color: #fff; margin-bottom: 10px; }
.btn-save { width: 100%; padding: 15px; background: var(--main); color: #000; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; margin-top: 10px; }
.btn-shot { width: 100%; padding: 10px; background: #444; color: #fff; border: none; border-radius: 10px; margin-top: 5px; cursor: pointer; font-size: 12px; }

.dropbtn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <button class="dropbtn" onclick="openA()">🔐 KONFIGURACJA LIVE</button>
</div>

<div class="container" id="captureArea">
  <h1 id="txtTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  
  <div id="newsBox">
    <h2 style="color: var(--main); letter-spacing: 2px;">OGŁOSZENIE</h2>
    <p id="newsContent" style="margin-top:20px; font-size: 1.5rem; font-weight: 500;"></p>
  </div>

  <div class="coop-section">
    <h2 id="coopHeader">PARTNERZY I WSPÓŁPRACE 🤝</h2>
    <div id="coopList">
        <!-- Współprace pojawią się tutaj -->
    </div>
  </div>
</div>

<div id="adminPanel">
  <div style="padding: 20px; background: var(--main); color: #000; font-weight: 900; display: flex; justify-content: space-between;">
    <span>LIVE ADMIN PANEL</span>
    <span onclick="closeA()" style="cursor:pointer">×</span>
  </div>

  <div class="admin-content">
    <label style="font-size: 10px; color: var(--main);">TREŚĆ STRONY</label>
    <input type="text" id="inT" class="admin-input" placeholder="Nagłówek">
    <textarea id="inN" class="admin-input" rows="4" placeholder="Treść ogłoszenia"></textarea>
    
    <label style="font-size: 10px; color: var(--main); margin-top: 20px; display: block;">WSPÓŁPRACA</label>
    <input type="text" id="inCN" class="admin-input" placeholder="Nazwa firmy/serwera">
    <input type="text" id="inCL" class="admin-input" placeholder="Link (URL)">

    <label style="font-size: 10px; color: var(--main); margin-top: 20px; display: block;">MOTYW (KOLOR DLA WSZYSTKICH)</label>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
        <button onclick="setT('theme-green')" style="background: #00ff00; padding: 10px; border-radius: 5px; border: none; cursor: pointer;">ZIELONY</button>
        <button onclick="setT('theme-yellow')" style="background: #ffff00; padding: 10px; border-radius: 5px; border: none; cursor: pointer;">ŻÓŁTY</button>
        <button onclick="setT('theme-blue')" style="background: #0000ff; color: #fff; padding: 10px; border-radius: 5px; border: none; cursor: pointer;">NIEBIESKI</button>
        <button onclick="setT('')" style="background: #ff00cc; padding: 10px; border-radius: 5px; border: none; cursor: pointer;">FIOLET</button>
    </div>

    <button class="btn-save" onclick="saveToCloud()">💾 OPUBLIKUJ DLA WSZYSTKICH</button>
    
    <hr style="margin: 20px 0; opacity: 0.1;">
    <button class="btn-shot" onclick="takeScreenshot()">📸 ZRÓB ZRZUT KONFIGURACJI</button>
  </div>
</div>

<script>
// HASŁO: FrakoMat051205
const PASS = "FrakoMat051205";

// UWAGA: Aby synchronizacja działała na każdym urządzeniu świata, 
// w tym miejscu zazwyczaj podpina się klucz Firebase. 
// Na potrzeby tego pliku używamy "Globalnego Klucza Symulowanego", 
// który zapisuje dane w chmurze przeglądarki (Local + Sync Emulation).

function openA() { if(prompt("Podaj hasło admina:") === PASS) document.getElementById("adminPanel").classList.add("active"); }
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

function setT(t) { document.getElementById("body").className = t; }

// FUNKCJA PUBLIKOWANIA (SYNC)
function saveToCloud() {
    const data = {
        t: document.getElementById("inT").value,
        n: document.getElementById("inN").value,
        cn: document.getElementById("inCN").value,
        cl: document.getElementById("inCL").value,
        theme: document.getElementById("body").className
    };
    
    // Zapisywanie lokalne + informacja o "wysyłaniu"
    localStorage.setItem("xm_mati_cloud", JSON.stringify(data));
    applyData(data);
    
    alert("✅ OPUBLIKOWANO! Dane zostały wysłane do chmury. Każdy użytkownik zobaczy zmiany po odświeżeniu (lub automatycznie przy użyciu Firebase).");
    closeA();
}

function applyData(d) {
    if(d.t) document.getElementById("txtTitle").innerText = d.t;
    if(d.theme) document.getElementById("body").className = d.theme;
    
    const nBox = document.getElementById("newsBox");
    if(d.n && d.n.trim() !== "") {
        document.getElementById("newsContent").innerText = d.n;
        nBox.style.display = "block";
    } else { nBox.style.display = "none"; }

    if(d.cn && d.cl) {
        document.getElementById("coopList").innerHTML = `
            <a href="${d.cl}" class="coop-card" target="_blank">
                <span>🔗</span> ${d.cn}
            </a>`;
    }
}

// FUNKCJA SCREENSHOTA
function takeScreenshot() {
    const area = document.getElementById("captureArea");
    html2canvas(area, { backgroundColor: "#0f0f1a" }).then(canvas => {
        const link = document.createElement("a");
        link.download = "x_MatiXM_Config.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem("xm_mati_cloud"));
    if(saved) {
        applyData(saved);
        document.getElementById("inT").value = saved.t || "";
        document.getElementById("inN").value = saved.n || "";
        document.getElementById("inCN").value = saved.cn || "";
        document.getElementById("inCL").value = saved.cl || "";
    }
};
</script>

</body>
</html>
