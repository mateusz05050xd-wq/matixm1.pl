<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community | Live Update</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --main: #ff00cc; --second: #3333ff;
  --bg: #050508; --card: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease; }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, #1a1a2e, #050508);
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
body.theme-green { --main: #00ff88; --second: #006633; }
body.theme-yellow { --main: #ffcc00; --second: #ff6600; }
body.theme-blue { --main: #00d4ff; --second: #0044ff; }

.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(5, 5, 8, 0.9);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}

.logo { font-family: 'Montserrat', sans-serif; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 10px var(--main); }

.container { max-width: 1000px; margin: auto; padding: 120px 20px; text-align: center; }

h1 { font-family: 'Montserrat', sans-serif; font-size: clamp(2rem, 8vw, 4rem); margin-bottom: 10px; background: linear-gradient(90deg, #fff, var(--main)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.hero-btns { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
.btn { padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: 700; color: white; background: linear-gradient(45deg, var(--main), var(--second)); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
.btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px var(--main); }

.stats-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 40px 0; }
.stat-box { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
.stat-box h3 { font-size: 2.5rem; color: var(--main); }

.card { background: var(--card); padding: 30px; border-radius: 25px; border: 1px solid var(--border); margin-top: 20px; }

/* PANEL ADMINA */
#adminPanel {
  position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; height: 100vh;
  background: #0a0a12; z-index: 9999; border-left: 3px solid var(--main);
  box-shadow: -10px 0 50px rgba(0,0,0,0.8); overflow-y: auto;
}
#adminPanel.active { right: 0; }

.admin-header { padding: 20px; background: var(--main); color: #000; font-weight: 900; display: flex; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.admin-content { padding: 20px; }

.field { margin-bottom: 15px; text-align: left; }
.field label { font-size: 11px; color: var(--main); font-weight: 700; text-transform: uppercase; }
.admin-input { width: 100%; padding: 12px; background: #151525; border: 1px solid #333; border-radius: 8px; color: #fff; margin-top: 5px; font-family: inherit; }

.btn-save { width: 100%; padding: 15px; background: var(--main); color: #000; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; }

.admin-btn-open { background: var(--card); border: 1px solid var(--border); color: #fff; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <button class="admin-btn-open" onclick="toggleAdmin()">⚙️ PANEL</button>
</div>

<div class="container">
  <h1 id="viewTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  <p id="viewTag" style="opacity:0.8">Wczytywanie...</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="viewDC">DISCORD</a>
    <a href="#" class="btn" id="viewYT">YOUTUBE</a>
  </div>

  <div class="stats-container">
    <div class="stat-box"><h3 id="vS1V">0</h3><p id="vS1L">Licznik 1</p></div>
    <div class="stat-box"><h3 id="vS2V">0</h3><p id="vS2L">Licznik 2</p></div>
    <div class="stat-box"><h3 id="vS3V">0</h3><p id="vS3L">Licznik 3</p></div>
  </div>

  <div class="card" id="newsBox" style="display:none">
    <h2 style="color: var(--main)">OGŁOSZENIE</h2>
    <p id="viewNews" style="margin-top:15px"></p>
  </div>
</div>

<div id="adminPanel">
  <div class="admin-header">
    <span>USTAWIENIA STRONY</span>
    <span onclick="toggleAdmin()" style="cursor:pointer">ZAMKNIJ ×</span>
  </div>
  <div class="admin-content">
    <div class="field"><label>Tytuł strony</label><input type="text" id="inT" class="admin-input"></div>
    <div class="field"><label>Podpis (Tagline)</label><input type="text" id="inTag" class="admin-input"></div>
    <div class="field"><label>Ogłoszenie (zostaw puste by ukryć)</label><textarea id="inN" class="admin-input"></textarea></div>
    
    <hr style="opacity:0.1; margin: 20px 0">
    
    <div class="field"><label>Licznik 1 (Wartość | Opis)</label>
      <input type="text" id="inS1V" class="admin-input" placeholder="Wartość">
      <input type="text" id="inS1L" class="admin-input" placeholder="Opis">
    </div>

    <div class="field"><label>Social Linki</label>
      <input type="text" id="inDC" class="admin-input" placeholder="Discord URL">
      <input type="text" id="inYT" class="admin-input" placeholder="YouTube URL">
    </div>

    <button class="btn-save" onclick="updateSite()">✅ ZAPISZ I ODŚWIEŻ</button>
    
    <div style="margin-top: 30px; padding: 15px; background: rgba(255,0,0,0.1); border-radius: 10px;">
      <label style="font-size: 10px; color: red;">KOD SYNCHRONIZACJI (Wyślij go na telefon)</label>
      <textarea id="syncExport" class="admin-input" style="font-size: 8px;" readonly></textarea>
      <button class="btn-save" style="background:#333; color:#fff" onclick="importData()">WPISZ KOD Z INNEGO URZĄDZENIA</button>
    </div>
  </div>
</div>

<script>
// Obiekt z domyślnymi danymi
let siteData = {
  t: "🔥 Społeczność x_MatiXM 🔥",
  tag: "Najlepsza ekipa w sieci!",
  n: "",
  s1v: "100", s1l: "Graczy",
  s2v: "50", s2l: "Online",
  s3v: "V6", s3l: "Wersja",
  dc: "#", yt: "#",
  theme: ""
};

function toggleAdmin() { document.getElementById('adminPanel').classList.toggle('active'); }

// Funkcja zapisu danych
function updateSite() {
  siteData = {
    t: document.getElementById('inT').value,
    tag: document.getElementById('inTag').value,
    n: document.getElementById('inN').value,
    s1v: document.getElementById('inS1V').value,
    s1l: document.getElementById('inS1L').value,
    dc: document.getElementById('inDC').value,
    yt: document.getElementById('inYT').value,
  };
  
  localStorage.setItem('mati_web_data', JSON.stringify(siteData));
  renderSite();
  alert("Zapisano lokalnie! Aby inni widzieli zmiany, musisz wrzucić plik na hosting (np. GitHub Pages).");
}

// Funkcja wyświetlania danych na stronie
function renderSite() {
  const saved = localStorage.getItem('mati_web_data');
  if(saved) siteData = JSON.parse(saved);

  document.getElementById('viewTitle').innerText = siteData.t;
  document.getElementById('viewTag').innerText = siteData.tag;
  
  if(siteData.n) {
    document.getElementById('newsBox').style.display = 'block';
    document.getElementById('viewNews').innerText = siteData.n;
  } else {
    document.getElementById('newsBox').style.display = 'none';
  }

  document.getElementById('vS1V').innerText = siteData.s1v;
  document.getElementById('vS1L').innerText = siteData.s1l;
  document.getElementById('viewDC').href = siteData.dc;
  document.getElementById('viewYT').href = siteData.yt;

  // Generowanie kodu do synchronizacji
  document.getElementById('syncExport').value = btoa(unescape(encodeURIComponent(JSON.stringify(siteData))));

  // Wypełnianie pól w panelu, żeby nie były puste
  document.getElementById('inT').value = siteData.t;
  document.getElementById('inTag').value = siteData.tag;
  document.getElementById('inN').value = siteData.n;
  document.getElementById('inS1V').value = siteData.s1v;
  document.getElementById('inS1L').value = siteData.s1l;
  document.getElementById('inDC').value = siteData.dc;
  document.getElementById('inYT').value = siteData.yt;
}

function importData() {
  const code = prompt("Wklej kod otrzymany z innego urządzenia:");
  if(code) {
    try {
      const decoded = decodeURIComponent(escape(atob(code)));
      localStorage.setItem('mati_web_data', decoded);
      location.reload();
    } catch(e) { alert("Błędny kod!"); }
  }
}

// Start strony
window.onload = renderSite;
</script>
</body>
</html>
