<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Poppins', sans-serif;
  color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2) 70%);
  overflow-x: hidden;
  transition: 0.5s;
}

/* MOTYWY */
:root {
  --bg1:#1a1a2e;
  --bg2:#0f0f1a;
  --main:#ff00cc;
  --second:#6a5cff;
}

.theme-blue {
  --main:#00c6ff;
  --second:#0072ff;
}

.theme-green {
  --main:#00ff88;
  --second:#00c853;
}

/* TOP MENU */
.topbar {
  position: fixed;
  width: 100%;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  z-index: 999;
}

.dropdown {
  position: relative;
}

.dropbtn {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 10px 15px;
  border-radius: 10px;
  cursor: pointer;
}

.dropdown-content {
  display: none;
  position: absolute;
  background: rgba(0,0,0,0.8);
  border-radius: 10px;
  margin-top: 5px;
}

.dropdown-content button {
  display: block;
  width: 100%;
  background: none;
  border: none;
  color: white;
  padding: 10px;
  cursor: pointer;
}

.dropdown:hover .dropdown-content {
  display: block;
}

/* RESZTA */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 100px 20px 60px;
  text-align: center;
}

h1 {
  font-size: 56px;
  margin-bottom: 10px;
  background: linear-gradient(90deg, var(--main), var(--second));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline { margin-bottom: 50px; }

.buttons {
  display: flex;
  justify-content: center;
  gap: 25px;
  flex-wrap: wrap;
  margin-bottom: 60px;
}

.btn {
  padding: 18px 34px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 600;
  background: linear-gradient(45deg,var(--main),var(--second));
  color: white;
  transition: 0.3s;
}

.btn:hover { transform: scale(1.1); }

.card {
  margin-top: 60px;
  padding: 35px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
}

.youtube iframe {
  width: 100%;
  max-width: 800px;
  height: 450px;
  border-radius: 16px;
}

footer {
  margin-top: 60px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- GÓRNY PANEL -->
<div class="topbar">

  <!-- JĘZYK -->
  <div class="dropdown">
    <button class="dropbtn">🌐 Język</button>
    <div class="dropdown-content">
      <button onclick="setLang('pl')">🇵🇱 Polski</button>
      <button onclick="setLang('en')">🇬🇧 English</button>
    </div>
  </div>

  <!-- KOLOR -->
  <div class="dropdown">
    <button class="dropbtn">🎨 Kolor</button>
    <div class="dropdown-content">
      <button onclick="setTheme('')">💜 Domyślny</button>
      <button onclick="setTheme('theme-blue')">💙 Niebieski</button>
      <button onclick="setTheme('theme-green')">💚 Zielony</button>
    </div>
  </div>

</div>

<div class="container">

<h1 id="title">🔥 Społeczność MatiXM 🔥</h1>
<p class="tagline" id="tagline">YouTube • Discord • Gaming • Społeczność</p>

<div class="buttons">
  <a class="btn" id="discordBtn" href="https://discord.gg/e2ynfWRC" target="_blank">💬 Dołącz do Discorda</a>
  <a class="btn" id="ytBtn" href="https://www.youtube.com/@MatiXM-123" target="_blank">📺 Kanał YouTube</a>
</div>

<div class="card">
  <h2 id="latest">Najnowszy film</h2>
  <p id="desc">Zobacz mój kanał i dołącz do społeczności!</p>
</div>

<div class="youtube">
  <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=MatiXM-123"></iframe>
</div>

<div class="card">
  <h2 id="coop">Współprace 🤝</h2>
  <p id="coopDesc">Chcesz współpracę? Twój serwer pojawi się na Discordzie.</p>
</div>

<footer id="footer">
© 2026 MatiXM • Strona społeczności
</footer>

</div>

<script>

/* JĘZYKI */
const translations = {
  pl: {
    title: "🔥 Społeczność MatiXM 🔥",
    tagline: "YouTube • Discord • Gaming • Społeczność",
    discord: "💬 Dołącz do Discorda",
    yt: "📺 Kanał YouTube",
    latest: "Najnowszy film",
    desc: "Zobacz mój kanał i dołącz do społeczności!",
    coop: "Współprace 🤝",
    coopDesc: "Chcesz współpracę? Twój serwer pojawi się na Discordzie.",
    footer: "© 2026 MatiXM • Strona społeczności"
  },
  en: {
    title: "🔥 MatiXM Community 🔥",
    tagline: "YouTube • Discord • Gaming • Community",
    discord: "💬 Join Discord",
    yt: "📺 YouTube Channel",
    latest: "Latest video",
    desc: "Check out my channel and join the community!",
    coop: "Partnerships 🤝",
    coopDesc: "Want to collaborate? Your server will appear on our Discord.",
    footer: "© 2026 MatiXM • Community website"
  }
};

function setLang(lang) {
  document.getElementById("title").innerText = translations[lang].title;
  document.getElementById("tagline").innerText = translations[lang].tagline;
  document.getElementById("discordBtn").innerText = translations[lang].discord;
  document.getElementById("ytBtn").innerText = translations[lang].yt;
  document.getElementById("latest").innerText = translations[lang].latest;
  document.getElementById("desc").innerText = translations[lang].desc;
  document.getElementById("coop").innerText = translations[lang].coop;
  document.getElementById("coopDesc").innerText = translations[lang].coopDesc;
  document.getElementById("footer").innerText = translations[lang].footer;
}

/* MOTYW */
function setTheme(theme) {
  document.body.className = theme;
}

</script>

</body>
</html>
