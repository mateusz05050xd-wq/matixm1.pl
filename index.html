<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community | Pro</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg1: #0a0a12; --bg2: #111122;
  --main: #ff00cc; --second: #3333ff;
  --yellow: #ffd700; --glass: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
}

/* RESET I TYPOGRAFIA */
* { box-sizing: border-box; margin: 0; padding: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top right, #1a1a3a, var(--bg1));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
.theme-yellow { --main: #ffd700; --second: #ffa500; }
.theme-blue { --main: #00d2ff; --second: #3a7bd5; }
.theme-green { --main: #00ff88; --second: #00a65a; }

/* TOPBAR */
.topbar {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; background: rgba(10, 10, 18, 0.8);
  backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.nav-group { display: flex; gap: 10px; }
.dropbtn {
  background: var(--glass); border: 1px solid var(--border);
  color: #fff; padding: 10px 15px; border-radius: 12px; cursor: pointer;
}
.dropbtn:hover { background: var(--main); color: #000; }

.dropdown-content {
  position: absolute; top: 60px; right: 0; background: #0f0f1a;
  border: 1px solid var(--border); border-radius: 15px; min-width: 180px; display: none;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5); overflow: hidden;
}
.dropdown-content button {
  width: 100%; padding: 12px; border: none; background: none; color: #fff;
  text-align: left; cursor: pointer;
}
.dropdown-content button:hover { background: rgba(255,255,255,0.05); color: var(--main); }
.show { display: block; animation: slideUp 0.3s ease; }

/* KONTENER GŁÓWNY */
.container { max-width: 1000px; margin: auto; padding: 120px 20px 60px; text-align: center; }

h1 { 
  font-size: clamp(35px, 10vw, 70px); font-weight: 800; line-height: 1.1; margin-bottom: 20px;
  letter-spacing: -2px; background: linear-gradient(90deg, var(--main), var(--second));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

/* PRZYCISKI - NAPRAWIONE KLIKANIE */
.hero-btns { 
  display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; 
  margin: 40px 0; position: relative; z-index: 50; 
}
.btn {
  padding: 18px 40px; border-radius: 100px; text-decoration: none;
  font-weight: 600; color: #fff; position: relative;
  background: linear-gradient(45deg, var(--main), var(--second));
  box-shadow: 0 10px 20px rgba(0,0,0,0.3); overflow: hidden;
}
.btn:hover { transform: translateY(-5px); box-shadow: 0 15px 35px var(--main); }

/* WIDEO YOUTUBE */
.video-card {
  max-width: 800px; margin: 40px auto; border-radius: 30px;
  overflow: hidden; background: #000; border: 1px solid var(--border);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5); aspect-ratio: 16/9;
}
.video-card iframe { width: 100%; height: 100%; border: none; }

/* KARTY OGŁOSZEŃ I WSPÓŁPRAC */
.glass-card {
  background: var(--glass); border: 1px solid var(--border);
  backdrop-filter: blur(15px); border-radius: 25px; padding: 35px;
  margin: 20px 0; position: relative;
}

.coop-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
.coop-tag {
  background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 50px;
  border: 1px solid var(--main); color: var(--main); text-decoration: none; font-weight: 600;
}
.coop-tag:hover { background: var(--main); color: #000; }

/* PANEL ADMINA */
#adminPanel {
  position: fixed; right: -400px; top: 0; width: 350px; height: 100%;
  background: #080810; z-index: 2000; padding: 40px 30px;
  border-left: 2px solid var(--main); box-shadow: -20px 0 60px rgba(0,0,0,0.9);
  overflow-y: auto;
}
#adminPanel.active { right: 0; }

.admin-label { display: block; font-size: 11px; text-transform: uppercase; color: var(--main); font-weight: 700; margin: 15px 0 5px; }
.admin-input {
  width: 100%; background: #161625; border: 1px solid var(--border);
  padding: 12px; border-radius: 12px; color: #fff; font-family: inherit;
}
.admin-input:focus { border-color: var(--main); outline: none; }

.save-btn {
  width: 100%; padding: 15px; margin-top: 25px; border-radius: 12px;
  border: none; background: var(--main); color: #000; font-weight: 800; cursor: pointer;
}

@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body id="b">

<div class="topbar">
  <div class="logo">MXM PRO</div>
  <div class="nav-group">
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleM('langM')">🌐 <span id="lNow">PL</span></button>
      <div class="dropdown-content" id="langM">
        <button onclick="changeLang('pl')">🇵🇱 Polski</button>
        <button onclick="changeLang('en')">🇬🇧 English</button>
        <button onclick="changeLang('de')">🇩🇪 Deutsch</button>
      </div>
    </div>
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleM('themeM')">🎨 Styl</button>
      <div class="dropdown-content" id="themeM">
        <button onclick="setT('theme-yellow')">💛 Żółty Złoty</button>
        <button onclick="setT('theme-blue')">💙 Oceaniczny</button>
        <button onclick="setT('theme-green')">💚 Neonowy Zielony</button>
        <button onclick="setT('')">💜 Klasyczny MXM</button>
      </div>
    </div>
    <button class="dropbtn" onclick="openA()">🔐</button>
  </div>
</div>

<div class="container">
  <h1 id="txtTitle">🔥 Społeczność MatiXM 🔥</h1>
  <p id="txtTag" style="opacity: 0.6; font-size: 1.1rem;">Najlepsza ekipa w sieci • Gaming • Rozrywka</p>

  <div class="hero-btns">
    <a href="https://discord.gg" class="btn" id="btnDC" target="_blank">💬 DISCORD</a>
    <a href="https://youtube.com" class="btn" id="btnYT" target="_blank">📺 YOUTUBE</a>
  </div>

  <!-- SEKCJA WIDEO -->
  <div class="video-card">
    <iframe id="ytPlayer" src="https://youtube.com" allowfullscreen></iframe>
  </div>

  <!-- OGŁOSZENIE -->
  <div class="glass-card" id="newsBox" style="display:none;">
    <h2 id="txtNewsTitle">📢 Ogłoszenie</h2>
    <p id="txtNewsContent" style="margin-top:15px; font-size: 1.2rem; line-height: 1.6;"></p>
  </div>

  <!-- WSPÓŁPRACE -->
  <div class="glass-card">
    <h2 id="txtCoopTitle">🤝 Nasze Współprace</h2>
    <div class="coop-grid" id="coopList">
      <p style="opacity:0.4">Czekamy na nowych partnerów!</p>
    </div>
  </div>

  <footer style="margin-top: 50px; opacity: 0.3; font-size: 0.9rem;">© 2026 MatiXM Community | Powering Content</footer>
</div>

<!-- PANEL ADMINA -->
<div id="adminPanel">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="color:var(--main)">Ustawienia</h2>
    <span onclick="closeA()" style="cursor:pointer; font-size: 1.5rem;">×</span>
  </div>

  <label class="admin-label">Tytuł strony</label>
  <input type="text" id="inTitle" class="admin-input">

  <label class="admin-label">Treść Ogłoszenia (puste = ukryj)</label>
  <textarea id="inNews" class="admin-input" rows="3"></textarea>

  <label class="admin-label">ID filmu YouTube (po v=)</label>
  <input type="text" id="inYT" class="admin-input" placeholder="np. dQw4w9WgXcQ">

  <div style="margin-top:20px; border-top: 1px solid var(--border); padding-top:10px;">
    <label class="admin-label">Współpraca (Nazwa + Link)</label>
    <input type="text" id="inCName" class="admin-input" placeholder="Nazwa partnera">
    <input type="text" id="inCLink" class="admin-input" placeholder="Link (http...)">
  </div>

  <button class="save-btn" onclick="saveData()">💾 ZAPISZ ZMIANY</button>
</div>

<script>
const KEY = "mxm_pro_v5";
const PASS = "MatiXM05050";

/* FUNKCJE UI */
function toggleM(id) {
  document.querySelectorAll('.dropdown-content').forEach(d => d.id !== id && d.classList.remove('show'));
  document.getElementById(id).classList.toggle('show');
}

function setT(t) { document.getElementById("b").className = t; }

function openA() { if(prompt("Hasło:") === PASS) document.getElementById("adminPanel").classList.add("active"); }
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

/* LOGIKA DANYCH */
function saveData() {
  const settings = {
    title: document.getElementById("inTitle").value,
    news: document.getElementById("inNews").value,
    yt: document.getElementById("inYT").value,
    cName: document.getElementById("inCName").value,
    cLink: document.getElementById("inCLink").value
  };
  localStorage.setItem(KEY, JSON.stringify(settings));
  apply(settings);
  closeA();
}

function apply(data) {
  if(data.title) document.getElementById("txtTitle").innerText = data.title;
  
  // Wideo
  if(data.yt) {
    let id = data.yt.includes("v=") ? data.yt.split("v=")[1].split("&")[0] : data.yt;
    document.getElementById("ytPlayer").src = `https://youtube.com{id}`;
  }

  // Ogłoszenie
  const newsBox = document.getElementById("newsBox");
  if(data.news && data.news.trim() !== "") {
    document.getElementById("txtNewsContent").innerText = data.news;
    newsBox.style.display = "block";
  } else {
    newsBox.style.display = "none";
  }

  // Współpraca
  if(data.cName && data.cLink) {
    document.getElementById("coopList").innerHTML = `<a href="${data.cLink}" class="coop-tag" target="_blank">🔗 ${data.cName}</a>`;
  }
}

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(KEY));
  if(saved) {
    apply(saved);
    document.getElementById("inTitle").value = saved.title || "";
    document.getElementById("inNews").value = saved.news || "";
    document.getElementById("inYT").value = saved.yt || "";
    document.getElementById("inCName").value = saved.cName || "";
    document.getElementById("inCLink").value = saved.cLink || "";
  }
};

/* TŁUMACZENIA */
const dict = {
  pl: { nt: "📢 Ogłoszenie", ct: "🤝 Nasze Współprace", l: "PL" },
  en: { nt: "📢 Announcement", ct: "🤝 Our Partnerships", l: "EN" },
  de: { nt: "📢 Ankündigung", ct: "🤝 Kooperationen", l: "DE" }
};

function changeLang(l) {
  document.getElementById("txtNewsTitle").innerText = dict[l].nt;
  document.getElementById("txtCoopTitle").innerText = dict[l].ct;
  document.getElementById("lNow").innerText = dict[l].l;
}

// Zamykanie dropdownów
window.onclick = (e) => { if(!e.target.matches('.dropbtn')) document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('show')); };
</script>
</body>
</html>
