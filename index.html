<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM | Ultimate Community Hub</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  /* Domyślny Fiolet */
  --main: #bc13fe; --second: #5f00ff;
  --bg: #050508; --card: rgba(255, 255, 255, 0.03);
  --border: rgba(255, 255, 255, 0.08);
}

/* --- ŁADNE ODCIENIE --- */
body.blue { --main: #00d2ff; --second: #3a7bd5; }
body.green { --main: #00ff88; --second: #00a86b; }
body.yellow { --main: #ffcc00; --second: #ff9500; }
body.purple { --main: #bc13fe; --second: #5f00ff; }

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at 50% -20%, #1a1a2e, #050508);
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* NAVBAR */
.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 8%; z-index: 1000; background: rgba(5, 5, 8, 0.8);
  backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Montserrat', sans-serif; font-size: 1.6rem; letter-spacing: -1px; color: var(--main); text-shadow: 0 0 20px var(--main); }

/* MAIN CONTAINER */
.container { max-width: 1200px; margin: auto; padding: 150px 20px 80px; text-align: center; }

h1 { 
  font-family: 'Montserrat', sans-serif; font-size: clamp(2.5rem, 10vw, 5.5rem); line-height: 1; margin-bottom: 15px;
  background: linear-gradient(to bottom, #fff 30%, var(--main));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
}

.hero-btns { display: flex; justify-content: center; gap: 20px; margin: 50px 0; flex-wrap: wrap; }
.btn { 
  padding: 18px 45px; border-radius: 20px; text-decoration: none; font-weight: 600; color: white; 
  background: var(--card); border: 1px solid var(--border); position: relative; overflow: hidden;
}
.btn:hover { border-color: var(--main); transform: translateY(-7px); box-shadow: 0 15px 40px -10px var(--main); color: var(--main); }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-bottom: 60px; }
.stat-box { 
  background: var(--card); padding: 50px 30px; border-radius: 35px; border: 1px solid var(--border); 
  backdrop-filter: blur(10px); position: relative;
}
.stat-box:hover { background: rgba(255,255,255,0.06); border-color: var(--main); }
.stat-box h3 { font-family: 'Montserrat', sans-serif; font-size: 4rem; color: var(--main); line-height: 1; margin-bottom: 10px; }
.stat-box p { font-size: 0.8rem; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; }

/* OGŁOSZENIE */
.news-box { 
  background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent); 
  padding: 50px; border-radius: 40px; border: 1px solid var(--main); 
  margin-top: 40px; display: none; position: relative;
}
.news-box::before { content: ''; position: absolute; inset: 0; border-radius: 40px; box-shadow: 0 0 30px var(--main); opacity: 0.2; }

/* PANEL ADMINA */
#adminPanel {
  position: fixed; right: -100%; top: 0; width: 100%; max-width: 480px; height: 100vh;
  background: #08080c; z-index: 9999; border-left: 2px solid var(--main);
  box-shadow: -30px 0 80px rgba(0,0,0,0.9); padding: 35px; overflow-y: auto;
}
#adminPanel.active { right: 0; }

.admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
.field { margin-bottom: 20px; text-align: left; }
.field label { font-size: 11px; color: var(--main); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
.admin-input { 
  width: 100%; padding: 15px; background: #12121b; border: 1px solid #222; 
  border-radius: 15px; color: #fff; margin-top: 8px; font-family: inherit; 
}
.admin-input:focus { border-color: var(--main); outline: none; background: #161625; }

.btn-publish { 
  width: 100%; padding: 20px; background: var(--main); color: #000; border: none; 
  border-radius: 18px; font-weight: 900; cursor: pointer; margin-top: 30px; font-size: 1rem;
}
.theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 10px; }
.t-btn { height: 50px; border-radius: 12px; border: 2px solid transparent; cursor: pointer; }
.t-btn.active { border-color: #fff; transform: scale(0.9); }

.admin-trigger { background: var(--main); color: #000; border: none; padding: 10px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <button class="admin-trigger" onclick="auth()">🔐 ADMIN</button>
</div>

<div class="container">
  <h1 id="vT">Hub x_MatiXM</h1>
  <p id="vTag" style="font-size: 1.4rem; opacity: 0.6; font-weight: 300;">Wczytywanie Twojego świata...</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="vDC" target="_blank">DISCORD</a>
    <a href="#" class="btn" id="vYT" target="_blank">YOUTUBE</a>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><h3 id="v1v">0</h3><p id="v1l">Użytkowników</p></div>
    <div class="stat-box"><h3 id="v2v">0</h3><p id="v2l">Aktywność</p></div>
    <div class="stat-box"><h3 id="v3v">0</h3><p id="v3l">Status</p></div>
  </div>

  <div class="news-box" id="vNewsBox">
    <h2 id="vNewsT" style="color: var(--main); font-family: 'Montserrat';">OGŁOSZENIE</h2>
    <p id="vNewsC" style="font-size: 1.4rem; margin-top: 20px; font-weight: 300; line-height: 1.6;"></p>
  </div>
</div>

<div id="adminPanel">
  <div class="admin-header">
    <h2 style="font-family: 'Montserrat'">USTAWIENIA HUB</h2>
    <button onclick="closeA()" style="background:none; border:none; color:#fff; font-size:40px; cursor:pointer">&times;</button>
  </div>
  
  <div class="field"><label>Tytuł Główny</label><input type="text" id="inT" class="admin-input"></div>
  <div class="field"><label>Podtytuł</label><input type="text" id="inTag" class="admin-input"></div>
  
  <div class="field">
    <label>Wybierz Kolor Przewodni</label>
    <div class="theme-grid">
      <button class="t-btn" style="background:#bc13fe" onclick="setT('purple')"></button>
      <button class="t-btn" style="background:#00d2ff" onclick="setT('blue')"></button>
      <button class="t-btn" style="background:#00ff88" onclick="setT('green')"></button>
      <button class="t-btn" style="background:#ffcc00" onclick="setT('yellow')"></button>
    </div>
  </div>

  <div class="field"><label>Nagłówek Ogłoszenia</label><input type="text" id="inNT" class="admin-input"></div>
  <div class="field"><label>Treść Ogłoszenia (Zostaw puste by ukryć)</label><textarea id="inNC" class="admin-input" rows="3"></textarea></div>
  
  <div class="field">
    <label>Liczniki (Wartość | Nazwa)</label>
    <div style="display:flex; gap:10px; margin-bottom:10px"><input type="text" id="in1v" class="admin-input" placeholder="0"><input type="text" id="in1l" class="admin-input" placeholder="Tekst"></div>
    <div style="display:flex; gap:10px; margin-bottom:10px"><input type="text" id="in2v" class="admin-input" placeholder="0"><input type="text" id="in2l" class="admin-input" placeholder="Tekst"></div>
    <div style="display:flex; gap:10px"><input type="text" id="in3v" class="admin-input" placeholder="0"><input type="text" id="in3l" class="admin-input" placeholder="Tekst"></div>
  </div>

  <div class="field"><label>Linki Społecznościowe</label>
    <input type="text" id="inDC" class="admin-input" placeholder="Discord URL">
    <input type="text" id="inYT" class="admin-input" placeholder="YouTube URL">
  </div>

  <button class="btn-publish" onclick="push()">🚀 AKTUALIZUJ DLA KAŻDEGO</button>
</div>

<script>
// --- KONFIGURACJA ---
const DB_LINK = "TWOJA_BAZA_FIREBASE/data.json"; 
const PASS = "FrakoMat051205";
let selectedColor = "purple";

function closeA() { document.getElementById('adminPanel').classList.remove('active'); }
function auth() { if(prompt("Hasło:") === PASS) document.getElementById('adminPanel').classList.add('active'); else alert("Złe hasło!"); }
function setT(c) { selectedColor = c; document.body.className = c; }

// WYSYŁANIE DO FIREBASE
async function push() {
    const payload = {
        t: document.getElementById('inT').value,
        tag: document.getElementById('inTag').value,
        nt: document.getElementById('inNT').value,
        nc: document.getElementById('inNC').value,
        s1v: document.getElementById('in1v').value, s1l: document.getElementById('in1l').value,
        s2v: document.getElementById('in2v').value, s2l: document.getElementById('in2l').value,
        s3v: document.getElementById('in3v').value, s3l: document.getElementById('in3l').value,
        dc: document.getElementById('inDC').value,
        yt: document.getElementById('inYT').value,
        theme: selectedColor
    };

    try {
        await fetch(DB_LINK, { method: 'PUT', body: JSON.stringify(payload) });
        alert("GOTOWE! Zmiany są już u każdego. 🔥");
    } catch(e) { alert("Błąd połączenia!"); }
}

// POBIERANIE LIVE DLA WSZYSTKICH
async function update() {
    try {
        const r = await fetch(DB_LINK);
        const d = await r.json();
        if(!d) return;

        document.getElementById('vT').innerText = d.t;
        document.getElementById('vTag').innerText = d.tag;
        
        if(d.nc) {
            document.getElementById('vNewsBox').style.display = 'block';
            document.getElementById('vNewsT').innerText = d.nt || "OGŁOSZENIE";
            document.getElementById('vNewsC').innerText = d.nc;
        } else { document.getElementById('vNewsBox').style.display = 'none'; }

        document.getElementById('v1v').innerText = d.s1v; document.getElementById('v1l').innerText = d.s1l;
        document.getElementById('v2v').innerText = d.s2v; document.getElementById('v2l').innerText = d.s2l;
        document.getElementById('v3v').innerText = d.s3v; document.getElementById('v3l').innerText = d.s3l;
        
        document.getElementById('vDC').href = d.dc;
        document.getElementById('vYT').href = d.yt;
        
        setT(d.theme);

        // Ustawianie wartości w panelu, żebyś widział co edytujesz
        document.getElementById('inT').value = d.t; document.getElementById('inTag').value = d.tag;
        document.getElementById('inNT').value = d.nt; document.getElementById('inNC').value = d.nc;
        document.getElementById('in1v').value = d.s1v; document.getElementById('in1l').value = d.s1l;
        document.getElementById('in2v').value = d.s2v; document.getElementById('in2l').value = d.s2l;
        document.getElementById('in3v').value = d.s3v; document.getElementById('in3l').value = d.s3l;
        document.getElementById('inDC').value = d.dc; document.getElementById('inYT').value = d.yt;

    } catch(e) { console.warn("Oczekiwanie na bazę..."); }
}

setInterval(update, 3000);
window.onload = update;
</script>
</body>
</html>
