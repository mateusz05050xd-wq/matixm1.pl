<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg1:#1a1a2e; --bg2:#0f0f1a;
  --main:#ff00cc; --second:#6a5cff;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Poppins,sans-serif;
  color:#fff;
  background:radial-gradient(circle at top,var(--bg1),var(--bg2));
}

/* TOPBAR */
.topbar{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 5%;
  background:rgba(15,15,26,0.7);
  backdrop-filter:blur(15px);
}

/* DROPDOWN */
.dropdown{position:relative;}
.dropbtn{
  background:var(--glass);
  border:1px solid var(--border);
  color:white;
  padding:10px 18px;
  border-radius:12px;
  cursor:pointer;
}

.dropdown-content{
  display:none;
  position:absolute;
  right:0;
  background:#111;
  border-radius:10px;
}

.dropdown-content button{
  display:block;
  width:100%;
  padding:10px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}
.show{display:block;}

/* CONTAINER */
.container{
  padding:120px 20px;
  text-align:center;
}

/* BUTTON */
.btn{
  padding:15px 30px;
  border-radius:50px;
  text-decoration:none;
  color:white;
  background:linear-gradient(45deg,var(--main),var(--second));
  margin:10px;
}

/* CARD */
.card{
  margin-top:30px;
  padding:30px;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
}

/* ================= ADMIN PANEL ================= */

#adminPanel{
  position:fixed;
  top:0;
  right:-350px;
  width:320px;
  height:100%;
  background:rgba(15,15,26,0.95);
  backdrop-filter:blur(15px);
  padding:20px;
  transition:0.4s;
  z-index:9999;
  border-left:1px solid var(--border);
}

/* HEADER PANELU */
.admin-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.close-btn{
  cursor:pointer;
  font-size:18px;
}

/* INPUTY */
input,textarea{
  width:100%;
  margin-bottom:12px;
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--glass);
  color:white;
}

/* BUTTON */
.admin-save{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:linear-gradient(45deg,var(--main),var(--second));
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.admin-save:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="topbar">
  <b>MXM</b>

  <div class="dropdown">
    <button class="dropbtn" onclick="toggleMenu()">⚙️</button>
    <div class="dropdown-content" id="menu">
      <button onclick="openAdmin()">🔐 Panel admina</button>
    </div>
  </div>
</div>

<div class="container">

<h1>🔥 MatiXM Community 🔥</h1>

<a class="btn" id="dcBtn" href="https://discord.gg/CxSAnTpt" target="_blank">Discord</a>
<a class="btn" id="ytBtn" href="https://www.youtube.com/@MatiXM-123" target="_blank">YouTube</a>

<div id="announcementBox" class="card"></div>

<div class="card">
<iframe id="ytFrame" width="100%" height="400" src="https://www.youtube.com/embed?autoplay=1&mute=1"></iframe>
</div>

</div>

<!-- PANEL ADMIN -->
<div id="adminPanel">

<div class="admin-header">
  <h3>Panel Admina</h3>
  <span class="close-btn" onclick="closeAdmin()">✖</span>
</div>

<textarea id="a1" placeholder="📢 Ogłoszenie"></textarea>
<input id="a2" placeholder="🎬 YouTube embed link">
<input id="a3" placeholder="💬 Discord link">

<button class="admin-save" onclick="save()">💾 Zapisz</button>

</div>

<script>

/* DROPDOWN */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("show");
}

/* ADMIN */
function openAdmin(){
  const pass = prompt("Hasło:");
  if(pass !== "MatiXM05050") return alert("Złe hasło!");

  document.getElementById("adminPanel").style.right = "0";
}

function closeAdmin(){
  document.getElementById("adminPanel").style.right = "-350px";
}

function save(){
  const data={
    text:a1.value,
    yt:a2.value,
    dc:a3.value
  };
  localStorage.setItem("mxm",JSON.stringify(data));
  apply(data);
}

/* APPLY */
function apply(d){
  if(d.text) announcementBox.innerText=d.text;
  if(d.yt) ytFrame.src=d.yt;
  if(d.dc) dcBtn.href=d.dc;
}

/* LOAD */
const saved=JSON.parse(localStorage.getItem("mxm"));
if(saved) apply(saved);

</script>

</body>
</html>
