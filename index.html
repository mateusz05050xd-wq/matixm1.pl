<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg1:#1a1a2e; --bg2:#0f0f1a;
  --main:#ff00cc; --second:#6a5cff;
}

body{
  font-family:Poppins,sans-serif;
  margin:0;
  color:white;
  background:radial-gradient(circle at top,var(--bg1),var(--bg2));
}

/* NAV */
.topbar{
  position:fixed;
  width:100%;
  padding:15px;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:space-between;
  z-index:1000;
}

.admin-link{
  cursor:pointer;
  color:#00ffcc;
}

/* CONTAINER */
.container{
  padding:120px 20px;
  text-align:center;
}

.btn{
  padding:15px 30px;
  border-radius:50px;
  text-decoration:none;
  color:white;
  background:linear-gradient(45deg,var(--main),var(--second));
  margin:10px;
  display:inline-block;
}

/* PANEL ADMIN */
#adminPage{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
  padding:30px;
}

input, textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
}

button{
  padding:10px;
  width:100%;
}

/* stats */
.stats{margin-top:40px;}
</style>
</head>

<body>

<div class="topbar">
  <b>MXM</b>
  <div class="admin-link" onclick="openAdmin()">⚙️ STRONA ADMIN</div>
</div>

<div class="container">

<h1>🔥 MatiXM Community 🔥</h1>

<div>
<a class="btn" id="dcBtn" href="https://discord.gg/CxSAnTpt" target="_blank">Discord</a>
<a class="btn" id="ytBtn" href="https://www.youtube.com/@MatiXM-123" target="_blank">YouTube</a>
</div>

<div class="stats">
<h2 id="subs">...</h2>
<p>🔴 Subów</p>

<h2 id="online">...</h2>
<p>👥 Online</p>
</div>

<div id="announcementBox"></div>

<div style="margin-top:40px;">
<iframe id="ytFrame" width="100%" height="400" src="https://www.youtube.com/embed?autoplay=1&mute=1"></iframe>
</div>

</div>

<!-- PANEL ADMIN -->
<div id="adminPage">

<h2>🔐 Panel Admina</h2>

<label>📢 Ogłoszenie</label>
<textarea id="a1"></textarea>

<label>🎬 YouTube embed link</label>
<input id="a2">

<label>💬 Discord link</label>
<input id="a3">

<button onclick="save()">💾 ZAPISZ</button>
<button onclick="closeAdmin()">❌ Zamknij</button>

</div>

<script>

/* ================= ADMIN ================= */

function openAdmin(){
  const pass = prompt("Hasło:");
  if(pass !== "MatiXM05050") return alert("Złe hasło!");

  document.getElementById("adminPage").style.display = "block";
  load();
}

function closeAdmin(){
  document.getElementById("adminPage").style.display = "none";
}

function save(){
  const data = {
    text: document.getElementById("a1").value,
    yt: document.getElementById("a2").value,
    dc: document.getElementById("a3").value
  };

  localStorage.setItem("mxmAdmin", JSON.stringify(data));
  apply(data);
  alert("Zapisano!");
}

function load(){
  const data = JSON.parse(localStorage.getItem("mxmAdmin")) || {};

  document.getElementById("a1").value = data.text || "";
  document.getElementById("a2").value = data.yt || "";
  document.getElementById("a3").value = data.dc || "";
}

function apply(data){
  if(data.text){
    document.getElementById("announcementBox").innerText = data.text;
  }

  if(data.yt){
    document.getElementById("ytFrame").src = data.yt;
  }

  if(data.dc){
    document.getElementById("dcBtn").href = data.dc;
  }
}

/* AUTO LOAD */
const saved = JSON.parse(localStorage.getItem("mxmAdmin"));
if(saved) apply(saved);

/* ================= YOUTUBE API ================= */

// WSTAW SWÓJ KLUCZ
const API_KEY = "TWOJ_API_KEY";
const CHANNEL_ID = "UC";

async function getSubs(){
  try{
    const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CHANNEL_ID}&key=${API_KEY}`);
    const data = await res.json();
    const subs = data.items[0].statistics.subscriberCount;
    document.getElementById("subs").innerText = subs;
  }catch{
    document.getElementById("subs").innerText = "...";
  }
}
getSubs();
setInterval(getSubs,60000);

/* ================= ONLINE ================= */

function online(){
  document.getElementById("online").innerText = Math.floor(Math.random()*20)+5;
}
online();
setInterval(online,5000);

</script>

</body>
</html>
