<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x_MatiXM Community</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
:root {
  --bg1: #1a1a2e; --bg2: #0f0f1a;
  --main: #ff00cc; --second: #6a5cff;
  --glass: rgba(255, 255, 255, 0.05);
  --border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; transition: 0.3s ease; }

body {
  font-family: 'Poppins', sans-serif; color: #fff;
  background: radial-gradient(circle at top, var(--bg1), var(--bg2));
  background-attachment: fixed; min-height: 100vh; overflow-x: hidden;
}

/* MOTYWY */
.theme-green { --main: #00ff00; --second: #008000; }
.theme-yellow { --main: #ffff00; --second: #ffaa00; }
.theme-blue { --main: #0000ff; --second: #00ccff; }
.theme-red { --main: #ff0000; --second: #8b0000; }

/* UI STRONY */
.topbar {
  position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 15px 5%; z-index: 1000; background: rgba(15, 15, 26, 0.9);
  backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
}
.logo { font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }

.container { max-width: 1000px; margin: auto; padding: 120px 20px 60px; text-align: center; }
h1 { font-size: clamp(30px, 8vw, 65px); font-weight: 900; margin-bottom: 20px; background: linear-gradient(90deg, var(--main), var(--second)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.hero-btns { display: flex; justify-content: center; gap: 20px; margin: 40px 0; z-index: 100; position: relative; }
.btn { padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 700; color: white; background: linear-gradient(45deg, var(--main), var(--second)); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

.video-wrapper { max-width: 850px; margin: 30px auto; aspect-ratio: 16/9; border-radius: 25px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
.video-wrapper iframe { width: 100%; height: 100%; border: none; }

.card { margin-top: 30px; padding: 40px; border-radius: 24px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(12px); }
.coop-list { margin-top: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
.coop-box { padding: 10px 20px; border-radius: 12px; border: 2px solid var(--main); color: var(--main); text-decoration: none; font-weight: bold; }

/* 🔐 ELITARNY PANEL ADMINA */
#adminPanel {
  position: fixed; right: -420px; top: 0; width: 400px; height: 100vh;
  background: #080810; z-index: 9999; border-left: 4px solid var(--main);
  box-shadow: -20px 0 60px rgba(0,0,0,0.9); display: flex; flex-direction: column;
}
#adminPanel.active { right: 0; }

.admin-tabs { display: flex; background: #111; border-bottom: 1px solid var(--border); }
.tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; cursor: pointer; font-weight: bold; font-size: 12px; }
.tab-btn.active { color: var(--main); border-bottom: 2px solid var(--main); background: rgba(255,255,255,0.02); }

.admin-body { padding: 25px; overflow-y: auto; flex-grow: 1; display: none; }
.admin-body.active { display: block; }

.field-group { margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
.field-group label { display: block; font-size: 10px; color: var(--main); font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }

.admin-input { width: 100%; padding: 12px; background: #161625; border: 1px solid var(--border); border-radius: 10px; color: #fff; margin-bottom: 10px; }
.admin-input:focus { border-color: var(--main); outline: none; }

.btn-save { width: 100%; padding: 16px; background: var(--main); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; margin-top: 10px; font-size: 14px; }
.btn-save:hover { filter: brightness(1.2); transform: scale(1.02); }

.log-item { font-size: 11px; padding: 8px; border-bottom: 1px solid var(--border); color: #888; }
.log-item b { color: var(--main); }

.dropbtn { background: var(--glass); border: 1px solid var(--border); color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer; }
.dropdown-content { position: absolute; top: 50px; right: 0; background: #111; border-radius: 12px; min-width: 150px; display: none; border: 1px solid var(--border); }
.show { display: block; }
</style>
</head>
<body id="body">

<div class="topbar">
  <div class="logo">x_MatiXM</div>
  <div style="display:flex; gap:10px;">
    <button class="dropbtn" onclick="document.getElementById('themeMenu').classList.toggle('show')">🎨 Styl</button>
    <div class="dropdown-content" id="themeMenu">
        <button style="width:100%; padding:10px; background:none; border:none; color:white; text-align:left; cursor:pointer;" onclick="setT('theme-green')">Zielony</button>
        <button style="width:100%; padding:10px; background:none; border:none; color:white; text-align:left; cursor:pointer;" onclick="setT('theme-yellow')">Żółty</button>
        <button style="width:100%; padding:10px; background:none; border:none; color:white; text-align:left; cursor:pointer;" onclick="setT('theme-blue')">Niebieski</button>
        <button style="width:100%; padding:10px; background:none; border:none; color:white; text-align:left; cursor:pointer;" onclick="setT('')">Fioletowy</button>
    </div>
    <button class="dropbtn" style="border-color: var(--main);" onclick="openA()">🔐 Admin</button>
  </div>
</div>

<div class="container">
  <h1 id="txtTitle">🔥 Społeczność x_MatiXM 🔥</h1>
  <p id="txtTag" style="opacity:0.7">YouTube • Discord • Społeczność</p>

  <div class="hero-btns">
    <a href="#" class="btn" id="linkDC" target="_blank">💬 DISCORD</a>
    <a href="#" class="btn" id="linkYT" target="_blank">📺 YOUTUBE</a>
  </div>

  <div class="card" id="newsBox" style="display:none;">
    <h2 id="newsHeader">Ogłoszenie</h2>
    <p id="newsContent" style="margin-top:15px; font-size: 1.2rem;"></p>
  </div>

  <div class="video-wrapper">
    <iframe id="videoPlayer" src="https://youtube.com" allowfullscreen></iframe>
  </div>

  <div class="card">
    <h2>Współprace 🤝</h2>
    <div id="coopList" class="coop-list">
      <p style="opacity:0.3">Brak współprac.</p>
    </div>
  </div>
</div>

<!-- 🔐 ULEPSZONY PANEL ADMINA V3 -->
<div id="adminPanel">
  <div style="padding: 20px; background: var(--main); color: #000; display: flex; justify-content: space-between; align-items: center;">
    <b style="font-size: 18px;">Elite Admin Panel</b>
    <span onclick="closeA()" style="cursor:pointer; font-size: 24px; font-weight: bold;">&times;</span>
  </div>

  <div class="admin-tabs">
    <button class="tab-btn active" onclick="switchTab(0)">TREŚĆ</button>
    <button class="tab-btn" onclick="switchTab(1)">SOCIALS</button>
    <button class="tab-btn" onclick="switchTab(2)">LOGI</button>
  </div>

  <!-- TAB 0: TREŚĆ -->
  <div class="admin-body active">
    <div class="field-group">
        <label>Główny Nagłówek</label>
        <input type="text" id="inTitle" class="admin-input" oninput="document.getElementById('txtTitle').innerText=this.value">
        <label>Ogłoszenie (Zostaw puste by ukryć)</label>
        <textarea id="inNews" class="admin-input" rows="4"></textarea>
    </div>
    <div class="field-group">
        <label>Partner (Nazwa + Link)</label>
        <input type="text" id="inCName" class="admin-input" placeholder="Nazwa">
        <input type="text" id="inCLink" class="admin-input" placeholder="URL">
    </div>
    <button class="btn-save" onclick="saveData()">💾 AKTUALIZUJ STRONĘ</button>
  </div>

  <!-- TAB 1: SOCIALS / MULTIMEDIA -->
  <div class="admin-body">
    <div class="field-group">
        <label>YouTube Video URL</label>
        <input type="text" id="inYT" class="admin-input" placeholder="Wklej link do filmu">
        <label>Link Zaproszenia Discord</label>
        <input type="text" id="inDC" class="admin-input">
        <label>Link do Kanału YouTube</label>
        <input type="text" id="inYTLink" class="admin-input">
    </div>
    <button class="btn-save" onclick="saveData()">💾 ZAPISZ SOCIAL MEDIA</button>
  </div>

  <!-- TAB 2: LOGI -->
  <div class="admin-body">
    <div id="adminLogs" style="background: #000; border-radius: 10px; height: 300px; overflow-y: auto; padding: 10px;">
        <div class="log-item">System gotowy...</div>
    </div>
    <button class="btn-save" style="background: #444; color: white;" onclick="localStorage.removeItem('xm_mati_db'); location.reload();">RESTART BAZY</button>
  </div>
</div>

<script>
const PASS = "FrakoMat051205";
const DB = "xm_mati_db";

function switchTab(idx) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
    document.querySelectorAll('.admin-body').forEach((b, i) => b.classList.toggle('active', i === idx));
}

function openA() {
    if(prompt("Hasło Elitarnego Admina:") === PASS) {
        document.getElementById("adminPanel").classList.add("active");
        addLog("Zalogowano pomyślnie");
    }
}
function closeA() { document.getElementById("adminPanel").classList.remove("active"); }

function addLog(msg) {
    const time = new Date().toLocaleTimeString();
    document.getElementById("adminLogs").innerHTML += `<div class="log-item">[${time}] <b>ACTION:</b> ${msg}</div>`;
}

function getYTId(url) {
    const reg = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
    const match = url.match(reg);
    return (match && match.length == 11) ? match : url;
}

function saveData() {
    const data = {
        title: document.getElementById("inTitle").value,
        news: document.getElementById("inNews").value,
        ytVid: getYTId(document.getElementById("inYT").value),
        linkDC: document.getElementById("inDC").value,
        linkYT: document.getElementById("inYTLink").value,
        cName: document.getElementById("inCName").value,
        cLink: document.getElementById("inCLink").value
    };
    localStorage.setItem(DB, JSON.stringify(data));
    apply(data);
    addLog("Zapisano zmiany w bazie danych");
    alert("Zatwierdzono zmiany!");
}

function apply(data) {
    if(data.title) document.getElementById("txtTitle").innerText = data.title;
    if(data.linkDC) document.getElementById("linkDC").href = data.linkDC;
    if(data.linkYT) document.getElementById("linkYT").href = data.linkYT;
    
    const nBox = document.getElementById("newsBox");
    if(data.news && data.news.trim() !== "") {
        document.getElementById("newsContent").innerText = data.news;
        nBox.style.display = "block";
    } else { nBox.style.display = "none"; }

    if(data.ytVid) document.getElementById("videoPlayer").src = `https://youtube.com{data.ytVid}`;

    if(data.cName && data.cLink) {
        document.getElementById("coopList").innerHTML = `<a href="${data.cLink}" class="coop-box" target="_blank">🔗 ${data.cName}</a>`;
    }
}

function setT(t) { document.getElementById("body").className = t; }

window.onload = () => {
    const saved = JSON.parse(localStorage.getItem(DB));
    if(saved) {
        apply(saved);
        document.getElementById("inTitle").value = saved.title || "";
        document.getElementById("inNews").value = saved.news || "";
        document.getElementById("inYT").value = saved.ytVid || "";
        document.getElementById("inDC").value = saved.linkDC || "";
        document.getElementById("inYTLink").value = saved.linkYT || "";
        document.getElementById("inCName").value = saved.cName || "";
        document.getElementById("inCLink").value = saved.cLink || "";
    }
};

window.onclick = (e) => { if (!e.target.matches('.dropbtn')) document.getElementById("themeMenu").classList.remove('show'); };
</script>
</body>
</html>
