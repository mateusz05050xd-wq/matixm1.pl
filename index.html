<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatiXM Community</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:'Poppins',sans-serif;
color:white;
background:radial-gradient(circle at top,#1a1a2e,#0f0f1a 70%);
overflow-x:hidden;
}

/* background */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffee,#ff00cc);
background-size:600% 600%;
animation:bgmove 15s ease infinite;
filter:blur(120px);
opacity:0.25;
z-index:-1;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LANGUAGE */
.lang-box{
position:fixed;
top:15px;
right:20px;
z-index:10;
}

.lang-btn{
background:rgba(255,255,255,0.1);
border:none;
color:white;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.lang-menu{
display:none;
margin-top:5px;
background:#111;
border-radius:10px;
overflow:hidden;
}

.lang-menu button{
display:block;
width:100%;
padding:10px;
border:none;
background:none;
color:white;
cursor:pointer;
text-align:left;
}

.lang-menu button:hover{
background:#333;
}

/* CONTENT */
.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
text-align:center;
}

h1{font-size:56px;margin-bottom:10px}

.tagline{margin-bottom:40px;opacity:0.9}

.btn{
padding:18px 34px;
border-radius:14px;
text-decoration:none;
font-weight:600;
background:linear-gradient(45deg,#ff00cc,#6a5cff);
color:white;
display:inline-block;
margin:10px;
position:relative;
overflow:hidden;
transition:0.2s;
}

.btn:hover{
transform:scale(1.08);
}

/* CLICK EFFECT */
.btn:active{
transform:scale(0.95);
}

.btn::after{
content:"";
position:absolute;
width:0;
height:0;
background:rgba(255,255,255,0.5);
border-radius:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

.btn:active::after{
width:200px;
height:200px;
transition:0.4s;
}

.card{
margin-top:40px;
padding:25px;
background:rgba(255,255,255,0.05);
border-radius:15px;
}

footer{
margin-top:50px;
opacity:0.7;
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang-box">
<button class="lang-btn" onclick="toggleLang()">🌍 Language</button>
<div class="lang-menu" id="langMenu">
<button onclick="setLang('pl')">🇵🇱 Polski</button>
<button onclick="setLang('en')">🇬🇧 English</button>
<button onclick="setLang('de')">🇩🇪 Deutsch</button>
<button onclick="setLang('es')">🇪🇸 Español</button>
</div>
</div>

<div class="container">

<h1 id="title"></h1>
<p class="tagline" id="tagline"></p>

<div>
<a class="btn" id="discordBtn" href="https://discord.gg/e2ynfWRC" target="_blank"></a>
<a class="btn" id="ytBtn" href="https://www.youtube.com/@MatiXM-123" target="_blank"></a>
</div>

<div class="card">
<h2 id="latest"></h2>
<p id="latestDesc"></p>
</div>

<div class="card">
<h2 id="collab"></h2>
<p id="collabDesc"></p>
</div>

<footer id="footer"></footer>

</div>

<script>
const t = {
pl:{
title:"🔥 Społeczność MatiXM 🔥",
tagline:"YouTube • Discord • Gaming • Społeczność",
discord:"💬 Dołącz do Discorda",
yt:"📺 Kanał YouTube",
latest:"Najnowszy film",
latestDesc:"Zobacz mój kanał i dołącz do społeczności!",
collab:"Współprace 🤝",
collabDesc:"Chcesz współpracę? Dołącz!",
footer:"© 2026 MatiXM"
},
en:{
title:"🔥 MatiXM Community 🔥",
tagline:"YouTube • Discord • Gaming • Community",
discord:"💬 Join Discord",
yt:"📺 YouTube Channel",
latest:"Latest video",
latestDesc:"Check my channel!",
collab:"Collaborations 🤝",
collabDesc:"Want to collaborate?",
footer:"© 2026 MatiXM"
},
de:{
title:"🔥 MatiXM Community 🔥",
tagline:"YouTube • Discord • Gaming • Community",
discord:"💬 Discord beitreten",
yt:"📺 YouTube Kanal",
latest:"Neuestes Video",
latestDesc:"Schau meinen Kanal!",
collab:"Kooperationen 🤝",
collabDesc:"Willst du zusammenarbeiten?",
footer:"© 2026 MatiXM"
},
es:{
title:"🔥 Comunidad MatiXM 🔥",
tagline:"YouTube • Discord • Gaming • Comunidad",
discord:"💬 Unirse a Discord",
yt:"📺 Canal de YouTube",
latest:"Último video",
latestDesc:"Mira mi canal!",
collab:"Colaboraciones 🤝",
collabDesc:"¿Quieres colaborar?",
footer:"© 2026 MatiXM"
}
};

function setLang(lang){
localStorage.setItem("lang", lang);

document.getElementById("title").innerText=t[lang].title;
document.getElementById("tagline").innerText=t[lang].tagline;
document.getElementById("discordBtn").innerText=t[lang].discord;
document.getElementById("ytBtn").innerText=t[lang].yt;
document.getElementById("latest").innerText=t[lang].latest;
document.getElementById("latestDesc").innerText=t[lang].latestDesc;
document.getElementById("collab").innerText=t[lang].collab;
document.getElementById("collabDesc").innerText=t[lang].collabDesc;
document.getElementById("footer").innerText=t[lang].footer;
}

function toggleLang(){
let menu=document.getElementById("langMenu");
menu.style.display = menu.style.display==="block"?"none":"block";
}

// load saved language
window.onload=()=>{
let lang=localStorage.getItem("lang") || "pl";
setLang(lang);
};

// close menu when clicking outside
document.addEventListener("click",(e)=>{
if(!e.target.closest(".lang-box")){
document.getElementById("langMenu").style.display="none";
}
});
</script>

</body>
</html>
